<template id="chat-input-area">
  <form ref="chatForm" class="d-flex flex-column gap-2">
    <div class="input-group">
      <label for="{{ messageInputId }}" class="visually-hidden">Type a message</label>
      <input type="text" id="{{ messageInputId }}" ref="messageInput" class="form-control"
        placeholder="Type a message..." aria-describedby="{{ fileHelpId }}" />
      <button type="button" ref="micBtn" class="btn btn-secondary" aria-label="Record Voice Memo">🎤</button>
      <button type="submit" ref="submitBtn" class="btn btn-primary">Send</button>
    </div>

    <label for="{{ fileInputId }}" class="visually-hidden">Attach a file</label>
    <input type="file" id="{{ fileInputId }}" ref="fileInput" class="form-control form-control-sm" />
    <div id="{{ fileHelpId }}" class="visually-hidden">Optional file attachment</div>
    <div ref="recordingIndicator" class="text-danger small fw-bold d-none">Recording...</div>
  </form>
</template>

<script type="module">
  import { defineComponent } from 'coralite';

  export default defineComponent({
    tokens: {
      messageInputId: () => 'msg-input-' + crypto.randomUUID(),
      fileInputId: () => 'file-input-' + crypto.randomUUID(),
      fileHelpId: () => 'file-help-' + crypto.randomUUID()
    },
    client: {
      script({ helpers }) {
        const chatForm = helpers.refs('chatForm');
        const messageInput = helpers.refs('messageInput');
        const fileInput = helpers.refs('fileInput');
        const submitBtn = helpers.refs('submitBtn');
        const micBtn = helpers.refs('micBtn');
        const recordingIndicator = helpers.refs('recordingIndicator');
        const emit = helpers.emit;

        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;

        micBtn.addEventListener('click', async () => {
          if (isRecording) {
            // Stop recording
            if (mediaRecorder) {
               mediaRecorder.stop();
            }
            return;
          }

          // Start recording
          try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = (event) => {
              if (event.data.size > 0) {
                audioChunks.push(event.data);
              }
            };

            mediaRecorder.onstop = () => {
              isRecording = false;
              micBtn.classList.remove('btn-danger');
              micBtn.classList.add('btn-secondary');
              recordingIndicator.classList.add('d-none');
              stream.getTracks().forEach(track => track.stop());

              const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
              
              submitBtn.disabled = true;
              chatForm.setAttribute('aria-busy', 'true');
              
              emit('chat:message-submitted', { 
                text: '', 
                file: audioBlob,
                fileName: 'voice_note.webm',
                fileType: 'audio/webm'
              });
            };

            mediaRecorder.start();
            isRecording = true;
            micBtn.classList.remove('btn-secondary');
            micBtn.classList.add('btn-danger');
            recordingIndicator.classList.remove('d-none');

          } catch (err) {
            console.error('Error accessing microphone:', err);
            alert('Could not access microphone.');
          }
        });

        chatForm.addEventListener('submit', (e) => {
          e.preventDefault();
          const text = messageInput.value.trim();
          const file = fileInput.files[0];
          
          if (text || file) {
            if (file) {
              const mimeType = file.type || '';
              if (mimeType.startsWith('image/') || mimeType.startsWith('audio/')) {
                // Async pipeline
                submitBtn.disabled = true;
                chatForm.setAttribute('aria-busy', 'true');
                emit('chat:message-submitted', { text, file, fileName: file.name, fileType: file.type });
              } else {
                // P2P pipeline
                emit('chat:p2p-file-selected', { file });
                fileInput.value = ''; // clear input
                // if there is text, still submit it
                if (text) {
                  submitBtn.disabled = true;
                  chatForm.setAttribute('aria-busy', 'true');
                  emit('chat:message-submitted', { text, file: null });
                }
              }
            } else {
              // Just text
              submitBtn.disabled = true;
              chatForm.setAttribute('aria-busy', 'true');
              emit('chat:message-submitted', { text, file: null });
            }
          }
        });

        // Listen for success/error to re-enable the form
        const unsubscribeSuccess = helpers.on('chat:message-sent', () => {
          messageInput.value = '';
          fileInput.value = '';
          submitBtn.disabled = false;
          chatForm.removeAttribute('aria-busy');
          messageInput.focus();
        });

        const unsubscribeError = helpers.on('chat:message-error', () => {
          submitBtn.disabled = false;
          chatForm.removeAttribute('aria-busy');
        });
      }
    }
  });
</script>
