<template id="chat-sidebar">
  <div class="d-flex flex-column h-100 border-end">
    <div class="p-3 border-bottom d-flex justify-content-between align-items-center bg-light">
      <h6 class="mb-0">Chats</h6>
      <button class="btn btn-sm btn-outline-primary" ref="newChatBtn" aria-label="New Chat">
        + New
      </button>
    </div>
    <div class="list-group list-group-flush flex-grow-1 overflow-auto" ref="chatList" aria-live="polite">
    </div>
  </div>
</template>

<script type="module">
  import { defineComponent } from 'coralite';

  export default defineComponent({
    client: {
      script({ helpers }) {
        const {
          refs,
          on,
          emit,
          getUserConversations,
          getCurrentUserId,
          pb
        } = helpers;
        
        const pbClient = pb();

        const chatList = refs('chatList');
        const newChatBtn = refs('newChatBtn');

        let conversations = [];
        let activeConversationId = null;
        let unreadCounts = {};

        const userId = getCurrentUserId();

        const generateNameAvatar = (name) => {
          const initials = name ? name.charAt(0).toUpperCase() : '?';
          // Use a simple hash to generate a consistent color
          let hash = 0;
          for (let i = 0; i < (name || '').length; i++) {
            hash = name.charCodeAt(i) + ((hash << 5) - hash);
          }
          const c = (hash & 0x00FFFFFF).toString(16).toUpperCase();
          const color = '#' + '00000'.substring(0, 6 - c.length) + c;
          
          return `<div class="rounded-circle text-white d-flex align-items-center justify-content-center" style="width: 32px; height: 32px; background-color: ${color}; font-size: 14px; font-weight: bold;">${initials}</div>`;
        };

        const generateAvatar = (name, record) => {
          const url = pbClient.files.getURL(record, record.avatar, {'thumb': '0x32'})

          return `<div class="rounded-circle" style="width: 32px; height: 32px;">
            <img src="${url}" alt="${name} - avatar" class="rounded-circle img-fluid">
          </div>`;
        };

        const renderList = () => {
          chatList.innerHTML = '';
          if (conversations.length === 0) {
            chatList.innerHTML = '<div class="p-3 text-muted text-center small">No chats yet</div>';
            return;
          }

          conversations.forEach(membership => {
            const convo = membership.expand?.conversation;
            if (!convo) return;

            let displayName = 'Unknown Chat';
            let avatarHtml = generateNameAvatar('?');

            if (convo.type === 'direct') {
              // Find the other user
              const members = convo.expand?.conversation_members_via_conversation || [];
              const otherMember = members.find(m => m.user !== userId);
              const otherUser = otherMember?.expand?.user;
              
              if (otherUser) {
                displayName = otherUser.username || otherUser.email || 'User';
                
                if (otherUser.avatar) {
                  avatarHtml = generateAvatar(displayName, otherUser);
                } else {
                  avatarHtml = generateNameAvatar(displayName);
                }
              } else if (members.length === 1 && members[0].user === userId) {
                 displayName = "Personal Notes";
                 avatarHtml = generateNameAvatar("P");
              }
            } else if (convo.type === 'group') {
              displayName = convo.name || 'Unnamed Group';
              avatarHtml = generateNameAvatar(displayName);
            }

            const isUnread = unreadCounts[convo.id] > 0;
            const unreadBadge = isUnread 
                ? `<span class="badge bg-danger rounded-pill ms-auto">${unreadCounts[convo.id]}</span>` 
                : '';

            const isActive = convo.id === activeConversationId;
            
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = `list-group-item list-group-item-action d-flex align-items-center py-3 border-0 border-bottom ${isActive ? 'active bg-primary text-white' : ''}`;
            btn.innerHTML = `
              <div class="me-3">${avatarHtml}</div>
              <div class="d-flex flex-column flex-grow-1 overflow-hidden">
                <div class="d-flex justify-content-between align-items-center">
                   <strong class="text-truncate" style="max-width: 150px;">${displayName}</strong>
                   ${unreadBadge}
                </div>
              </div>
            `;
            
            btn.addEventListener('click', () => {
              if (convo.id !== activeConversationId) {
                unreadCounts[convo.id] = 0; // reset unread count
                emit('chat:conversation-selected', {
                   conversationId: convo.id,
                   encrypted_chat_key: membership.encrypted_chat_key
                });
              }
            });

            chatList.appendChild(btn);
          });
        };

        const loadConversations = async () => {
          try {
            if (!userId || !pbClient) return;
            // Get user's conversation memberships, expanding conversation and its members and users
            const records = await pbClient.collection('conversation_members').getFullList({
              filter: `user = "${userId}"`,
              expand: 'conversation.conversation_members_via_conversation.user',
              sort: '-created'
            });
            conversations = records;
            renderList();
          } catch (error) {
            console.error('Failed to load conversations in sidebar:', error);
          }
        };

        // Initialize
        loadConversations();

        // Listen for new conversations (e.g. someone added me)
        const unsubscribePb = pbClient ? pbClient.collection('conversation_members').subscribe('*', async function (e) {
          if (e.action === 'create' && e.record.user === userId) {
            await loadConversations();
          }
        }) : null;

        // Event listeners
        const offSelected = on('chat:conversation-selected', (payload) => {
          activeConversationId = payload.conversationId;
          renderList();
        });

        const offMessageInactive = on('chat:message-received-inactive', (payload) => {
          const { conversationId } = payload;
          if (conversationId !== activeConversationId) {
            unreadCounts[conversationId] = (unreadCounts[conversationId] || 0) + 1;
            renderList();
          }
        });

        newChatBtn.addEventListener('click', () => {
          emit('chat:open-new-chat-modal');
        });
      }
    }
  });
</script>
