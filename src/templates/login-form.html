<template id="login-form">
  <div style="max-width: 330px; margin: 0 auto; padding-top: 50px;">
    <h1 class="h3 mb-3 fw-normal">Please sign in</h1>

    <form ref="loginForm">
      <div class="form-floating">
        <input type="email" ref="emailInput" class="form-control" name="email" id="{{ emailRef }}"
          placeholder="name@example.com" required autocomplete="email">
        <label for="{{ emailRef }}">Email address</label>
      </div>
      <div class="form-floating">
        <input type="password" ref="passwordInput" class="form-control" id="{{ passwordRef }}" name="password"
          placeholder="Password" required autocomplete="current-password">
        <label for="{{ passwordRef }}">Password</label>
      </div>

      <div class="form-check text-start my-3">
        <input class="form-check-input" type="checkbox" ref="rememberMeInput" id="{{ rememberMeRef }}">
        <label class="form-check-label" for="{{ rememberMeRef }}">
          Remember me
        </label>
      </div>
      <button class="btn btn-primary w-100 py-2" type="submit">Sign in</button>
    </form>
  </div>
</template>

<style>
  input[type="email"] {
    margin-bottom: -1px;
    border-bottom-right-radius: 0;
    border-bottom-left-radius: 0;
  }

  input[type="password"] {
    margin-bottom: 10px;
    border-top-left-radius: 0;
    border-top-right-radius: 0;
  }
</style>

<script type="module">
  import { defineComponent } from 'coralite';

  export default defineComponent({
    tokens: {
      emailRef () {
        return 'input_' + crypto.randomUUID()
      },
      passwordRef () {
        return 'input_' + crypto.randomUUID()
      },
      rememberMeRef () {
        return 'input_' + crypto.randomUUID()
      }
    },
    client: {
      script({ helpers }) {
        const loginForm = helpers.refs('loginForm');
        const emailInput = helpers.refs('emailInput');
        const passwordInput = helpers.refs('passwordInput');
        const rememberMeInput = helpers.refs('rememberMeInput');
        const login = helpers.login;

        loginForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          
          const email = emailInput.value;
          const password = passwordInput.value;
          const rememberMe = rememberMeInput.checked;

          const submitBtn = loginForm.querySelector('button[type="submit"]');
          submitBtn.disabled = true;

          try {
            await login(email, password, rememberMe);
            window.location.href = '/chat.html';
          } catch (error) {
            alert('Failed to sign in: ' + error.message);
          } finally {
            submitBtn.disabled = false;
          }
        });
      }
    }
  });
</script>
