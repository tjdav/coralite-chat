<template id="chat-layout">
  <div class="card mt-4 mb-4 shadow-sm mw-600 mx-auto">
    <div class="card-header bg-primary text-white">
      <h5 class="mb-0">Chat</h5>
    </div>

    <chat-message-list></chat-message-list>

    <div class="card-footer">
      <chat-input-area></chat-input-area>
    </div>
  </div>
</template>

<script type="module">
  import { defineComponent } from 'coralite';

  export default defineComponent({
    client: {
      async script({ helpers }) {
        const on = helpers.on;
        const emit = helpers.emit;
        const sendMessage = helpers.sendMessage;
        const getUserConversations = helpers.getUserConversations;
        const getCurrentUserId = helpers.getCurrentUserId;
        const getPrivateKey = helpers.getPrivateKey;
        const decryptConversationKey = helpers.decryptConversationKey;
        const encryptMessage = helpers.encryptMessage;

        let activeConversationId = null;
        let activeAesKey = null;

        // Fetch conversations and setup E2EE
        try {
           const userId = getCurrentUserId();
           if (!userId) throw new Error("Not logged in");

           const memberships = await getUserConversations(userId);
           if (memberships.length > 0) {
             const activeMembership = memberships[0]; // Just use the first one (Personal Notes)
             activeConversationId = activeMembership.conversation;
             
             // Get user's private key
             const privateKey = await getPrivateKey(userId);
             
             if (privateKey) {
               // Decrypt the AES conversation key
               activeAesKey = await decryptConversationKey(activeMembership.encrypted_chat_key, privateKey);
               
               // Notify child components that conversation is ready
               emit('chat:conversation-ready', { conversationId: activeConversationId, aesKey: activeAesKey });
             } else {
               alert("Cannot decrypt messages: Private key missing.");
             }
           }
        } catch(e) {
           console.error("Failed to setup chat", e);
        }

        // Orchestrate the message flow
        const unsubscribe = on('chat:message-submitted', async (payload) => {
          try {
            if (!activeConversationId || !activeAesKey) {
               throw new Error("Chat not initialized or keys missing");
            }
            
            // Encrypt message text
            const encryptedData = await encryptMessage(payload.text, activeAesKey);
            
            await sendMessage(encryptedData.ciphertext, encryptedData.iv, activeConversationId, payload.file);
            // Let input area know it succeeded
            emit('chat:message-sent');
          } catch (error) {
            console.error('Failed to send message:', error);
            alert('Failed to send message: ' + error.message);
            // Let input area know it failed
            emit('chat:message-error', { error });
          }
        });
      }
    }
  });
</script>
