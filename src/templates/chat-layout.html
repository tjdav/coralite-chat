<template id="chat-layout">
  <div class="card mt-4 mb-4 shadow-sm mx-auto d-line" style="max-width: 900px; height: 80vh;">
    <div class="row g-0 h-100">
      <div class="col-md-4 h-100 bg-light border-end">
        <chat-sidebar></chat-sidebar>
      </div>
      <div class="col-md-8 h-100 d-flex flex-column">
        <div class="card-header bg-primary text-white d-flex align-items-center justify-content-between rounded-0">
          <h5 class="mb-0" ref="chatHeaderTitle">Select a Chat</h5>
        </div>

        <div class="flex-grow-1 position-relative overflow-hidden">
          <chat-message-list></chat-message-list>
          <div ref="loadingOverlay"
            class="position-absolute top-0 start-0 w-100 h-100 bg-white d-flex align-items-center justify-content-center d-none"
            style="z-index: 10;">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
          </div>
        </div>

        <div class="card-footer border-top-0 rounded-0 bg-white" ref="inputFooter" style="display: none;">
          <chat-input-area></chat-input-area>
        </div>
      </div>
    </div>
  </div>
</template>

<script type="module">
  import { defineComponent } from 'coralite';

  export default defineComponent({
    client: {
      async script({ helpers }) {
        const {
          on,
          emit,
          refs,
          sendMessage,
          getCurrentUserId,
          getPrivateKey,
          decryptConversationKey,
          encryptMessage,
          pb
        } = helpers;
        
        const pbClient = pb();

        const loadingOverlay = refs('loadingOverlay');
        const inputFooter = refs('inputFooter');
        const chatHeaderTitle = refs('chatHeaderTitle');

        let activeConversationId = null;
        let activeAesKey = null;
        const userId = getCurrentUserId();

        if (!userId) {
          window.location.href = '/'
        }
        
        // Global message subscriber for unread counts
        let globalMessageUnsub = null;

        const setupGlobalMessageListener = () => {
          if (!userId || !pbClient) return;
          // Subscribe to all messages. The list rule in DB actually restricts this to only 
          // conversations the user is part of.
          globalMessageUnsub = pbClient.collection('messages').subscribe('*', function (e) {
            if (e.action === 'create') {
              // If it's not the active conversation, or it's from another user, emit inactive event
              if (e.record.conversation !== activeConversationId) {
                emit('chat:message-received-inactive', { conversationId: e.record.conversation });
              }
            }
          });
        };
        
        setupGlobalMessageListener();

        // Initial load behavior: Fetch most recently created/updated conversation member
        const loadInitialConversation = async () => {
          try {
            if (!userId) throw new Error("Not logged in");
            if (!pbClient) throw new Error("PocketBase client missing");
            
            // Show loading
            loadingOverlay.classList.remove('d-none');

            const records = await pbClient.collection('conversation_members').getFullList({
              filter: `user = "${userId}"`,
              sort: '-created',
              expand: 'conversation.conversation_members_via_conversation.user',
              $autoCancel: false
            });

            if (records.length > 0) {
               const activeMembership = records[0];
               await handleConversationSelected(activeMembership.conversation, activeMembership.encrypted_chat_key, activeMembership.expand?.conversation);
            } else {
               // No conversations yet
               loadingOverlay.classList.add('d-none');
               chatHeaderTitle.textContent = 'Welcome! Start a new chat.';
            }
          } catch(e) {
            console.error("Failed to load initial conversation:", e);
            loadingOverlay.classList.add('d-none');
          }
        };

        const handleConversationSelected = async (convoId, encryptedKeyBase64, convoObj) => {
          try {
            loadingOverlay.classList.remove('d-none');
             activeConversationId = convoId;
             
             // Get user's private key
             const privateKey = await getPrivateKey(userId);
             if (!privateKey) throw new Error("Private key missing");
             
             // Decrypt AES key
             activeAesKey = await decryptConversationKey(encryptedKeyBase64, privateKey);
             
             // Update Header Title
             if (convoObj) {
               if (convoObj.type === 'direct') {
                const members = convoObj.expand?.conversation_members_via_conversation || [];
                const otherMember = members.find(m => m.user !== userId);
                const otherUser = otherMember?.expand?.user;
                chatHeaderTitle.textContent = otherUser ? (otherUser.username || otherUser.email) : 'Personal Notes';
               } else {
                chatHeaderTitle.textContent = convoObj.name || 'Group Chat';
               }
             } else {
                chatHeaderTitle.textContent = 'Chat';
             }

             // Show input area
             inputFooter.style.display = 'block';

             // Tell the list component
             emit('chat:conversation-ready', { conversationId: activeConversationId, aesKey: activeAesKey });
             
          } catch(e) {
             console.error("Error setting up active conversation", e);
             alert("Error loading conversation: " + e.message);
          } finally {
            loadingOverlay.classList.add('d-none')
          }
        };

        // Listen for selection from sidebar
        on('chat:conversation-selected', async (payload) => {
           // To get convoObj, we could fetch it, but let's just fetch the specific convo to get the name
           try {
             const convoObj = await pbClient.collection('conversations').getOne(payload.conversationId, {
               expand: 'conversation_members_via_conversation.user'
             });
             await handleConversationSelected(payload.conversationId, payload.encrypted_chat_key, convoObj);
           } catch(e) {
             console.error("Error fetching selected conversation details", e);
           }
        });

        // Load initially
        loadInitialConversation();

        // Orchestrate the message flow
        const unsubscribe = on('chat:message-submitted', async (payload) => {
          try {
            if (!activeConversationId || !activeAesKey) {
               throw new Error("Chat not initialized or keys missing");
            }
            
            // Encrypt message text
            const encryptedData = await encryptMessage(payload.text, activeAesKey);
            
            let attachmentMeta = null;
            let attachmentIv = null;
            let fileToUpload = null;

            if (payload.file) {
              const { encryptBlob } = helpers;
              const { ciphertextBuffer, iv } = await encryptBlob(payload.file, activeAesKey);
              
              const blob = new Blob([ciphertextBuffer], { type: 'application/octet-stream' });
              // We need a File object to send to pocketbase
              fileToUpload = new File([blob], payload.fileName || 'attachment.enc', { type: 'application/octet-stream' });
              
              const metaObj = { name: payload.fileName, type: payload.fileType, fileIv: iv };
              const encryptedMeta = await encryptMessage(JSON.stringify(metaObj), activeAesKey);
              attachmentMeta = encryptedMeta.ciphertext;
              attachmentIv = encryptedMeta.iv;
            }

            await sendMessage(encryptedData.ciphertext, encryptedData.iv, activeConversationId, fileToUpload, attachmentMeta, attachmentIv);
            // Let input area know it succeeded
            emit('chat:message-sent');
          } catch (error) {
            console.error('Failed to send message:', error);
            alert('Failed to send message: ' + error.message);
            // Let input area know it failed
            emit('chat:message-error', { error });
          }
        });

        // P2P Flow
        let webrtcSignalUnsub = null;
        let p2pTargetId = null;

        const setupWebrtcListener = async () => {
          if (webrtcSignalUnsub) {
            await pbClient.collection('webrtc_signals').unsubscribe('*');
          }
          webrtcSignalUnsub = await pbClient.collection('webrtc_signals').subscribe('*', async function (e) {
            if (e.action === 'create' && e.record.target === userId) {
               // We have an incoming signal
               const signal = e.record;
               
               if (signal.conversation_id !== activeConversationId) return;

               try {
                  const { decryptMessage } = helpers;
                  const decryptedPayload = await decryptMessage(signal.encrypted_payload, signal.iv, activeAesKey);
                  const payload = JSON.parse(decryptedPayload);

                  if (signal.type === 'file_request') {
                     // Show incoming request UI
                     emit('chat:p2p-incoming-request', { signalId: signal.id, senderId: signal.sender, ...payload });
                  } else if (signal.type === 'file_accept') {
                     // The other user accepted our file request. Start WebRTC.
                     emit('chat:p2p-request-accepted', { signalId: signal.id, answerPayload: payload, senderId: signal.sender });
                     // Clean up
                     await pbClient.collection('webrtc_signals').delete(signal.id);
                  } else if (signal.type === 'file_decline') {
                     emit('chat:p2p-request-declined', { signalId: signal.id });
                     // Clean up
                     await pbClient.collection('webrtc_signals').delete(signal.id);
                  } else if (signal.type === 'webrtc_offer') {
                     emit('chat:p2p-webrtc-offer', { signalId: signal.id, offer: payload });
                     // Clean up
                     await pbClient.collection('webrtc_signals').delete(signal.id);
                  } else if (signal.type === 'webrtc_answer') {
                     emit('chat:p2p-webrtc-answer', { signalId: signal.id, answer: payload });
                     // Clean up
                     await pbClient.collection('webrtc_signals').delete(signal.id);
                  } else if (signal.type === 'webrtc_candidate') {
                     emit('chat:p2p-webrtc-candidate', { signalId: signal.id, candidate: payload });
                     // Clean up
                     await pbClient.collection('webrtc_signals').delete(signal.id);
                  }

               } catch(err) {
                 console.error("Error processing P2P signal", err);
               }
            }
          });
        };

        setupWebrtcListener();

        // Relay generic signals from bubble component to PocketBase
        on('chat:p2p-send-signal', async (payload) => {
          try {
            // If targetId is missing, fallback to the p2pTargetId stored globally for the active sender
            const targetId = payload.targetId || p2pTargetId;
            if (!targetId) {
                console.error("P2P missing targetId for signal", payload);
                return;
            }

            const { type, payload: signalPayload } = payload;
            
            const { encryptMessage } = helpers;
            const encryptedPayload = await encryptMessage(JSON.stringify(signalPayload), activeAesKey);
            
            await pbClient.collection('webrtc_signals').create({
               conversation_id: activeConversationId,
               sender: userId,
               target: targetId,
               type: type,
               encrypted_payload: encryptedPayload.ciphertext,
               iv: encryptedPayload.iv
            });
          } catch(e) {
             console.error("Error relaying signal", e);
          }
        });

        // Bubble Component actions
        on('chat:p2p-accept-clicked', async (payload) => {
           emit('chat:p2p-send-signal', { targetId: payload.senderId, type: 'file_accept', payload: { accepted: true } });
           try {
              // Delete the request signal
              await pbClient.collection('webrtc_signals').delete(payload.signalId);
           } catch(e) {
              console.error("Error deleting request signal", e);
           }
        });

        on('chat:p2p-decline-clicked', async (payload) => {
           emit('chat:p2p-send-signal', { targetId: payload.senderId, type: 'file_decline', payload: { declined: true } });
           try {
              // Delete the request signal
              await pbClient.collection('webrtc_signals').delete(payload.signalId);
           } catch(e) {
              console.error("Error deleting request signal", e);
           }
        });

        on('chat:p2p-file-selected', async (payload) => {
          try {
             const convoObj = await pbClient.collection('conversations').getOne(activeConversationId, {
               expand: 'conversation_members'
             });
             
             if (convoObj.type === 'group') {
                alert("P2P file sharing is currently only supported in direct 1-on-1 chats to ensure maximum privacy.");
                return;
             }

             const members = convoObj.expand?.conversation_members || [];
             const otherMember = members.find(m => m.user !== userId);
             
             if (!otherMember) {
                alert("Could not determine the other user in this conversation.");
                return;
             }
             p2pTargetId = otherMember.user;

             const metaObj = {
               fileName: payload.file.name,
               fileSize: payload.file.size,
               fileType: payload.file.type
             };

             const { encryptMessage } = helpers;
             const encryptedPayload = await encryptMessage(JSON.stringify(metaObj), activeAesKey);

             // Create a fake bubble indicating waiting
             emit('chat:p2p-sending-request', { file: payload.file, meta: metaObj, targetId: p2pTargetId });

             // Send signal
             await pbClient.collection('webrtc_signals').create({
                conversation_id: activeConversationId,
                sender: userId,
                target: p2pTargetId,
                type: 'file_request',
                encrypted_payload: encryptedPayload.ciphertext,
                iv: encryptedPayload.iv
             });

          } catch(e) {
             console.error("Error initiating P2P transfer", e);
             alert("Error initiating P2P transfer.");
          }
        });

        // Cleanup
        return () => {
          if (globalMessageUnsub) {
             pbClient.collection('messages').unsubscribe('*');
          }
          if (webrtcSignalUnsub) {
             pbClient.collection('webrtc_signals').unsubscribe('*');
          }
        };
      }
    }
  });
</script>
