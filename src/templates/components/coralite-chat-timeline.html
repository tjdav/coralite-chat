<template id="coralite-chat-timeline">
  <div class="d-flex flex-column p-4 overflow-auto h-100" ref="messagesContainer">
    <!-- Messages rendered here -->
  </div>
</template>

<script type="module" client>
  import { defineComponent } from 'coralite'

  export default defineComponent({
    client: {
      script: ({ root, helpers }) => {
        const messagesContainer = helpers.refs('messagesContainer')
        let currentCleanup = null

        const scrollToBottom = (smooth = true) => {
          messagesContainer.scrollTo({
            top: messagesContainer.scrollHeight,
            behavior: smooth ? 'smooth' : 'auto'
          })
        }

        const isNearBottom = () => {
          return messagesContainer.scrollHeight - messagesContainer.scrollTop - messagesContainer.clientHeight < 100
        }

        const renderMessage = (message, isCurrentUser) => {
          const time = new Date(message.date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          const messageClass = isCurrentUser ? 'justify-content-end' : 'justify-content-start'
          const bubbleClass = isCurrentUser ? 'bg-primary text-white' : 'bg-body-secondary text-body'
          const timeClass = isCurrentUser ? 'text-white-50 text-end' : 'text-muted'

          const div = document.createElement('div')
          div.className = 'd-flex mb-3 ' + messageClass
          div.innerHTML = `
            <div class="message-bubble p-3 rounded-4 shadow-sm ${bubbleClass}" style="max-width: 75%;">
              <p class="mb-1">${message.body}</p>
              <div class="${timeClass} small" style="font-size: 0.75rem;">
                ${time}
              </div>
            </div>
          `
          return div
        }

        helpers.on(helpers.events().CHAT_ROOM_READY, async ({ roomId }) => {
          if (currentCleanup) {
            currentCleanup()
          }

          messagesContainer.innerHTML = '' // Clear existing messages

          const currentUserId = await helpers.getCurrentUserId()

          // Fetch initial history
          const history = await helpers.getRoomMessages(roomId)

          history.forEach(msg => {
            const isCurrentUser = msg.sender === currentUserId
            messagesContainer.appendChild(renderMessage(msg, isCurrentUser))
          })

          // Scroll to bottom immediately
          setTimeout(() => scrollToBottom(false), 0)

          // Listen for new messages
          currentCleanup = await helpers.onRoomMessage(roomId, (newMsg) => {
            const isCurrentUser = newMsg.sender === currentUserId
            const nearBottom = isNearBottom()

            messagesContainer.appendChild(renderMessage(newMsg, isCurrentUser))

            // Auto-scroll logic: only if near bottom or if it's our own message
            if (nearBottom || isCurrentUser) {
              setTimeout(() => scrollToBottom(true), 0)
            }
          })
        })
      }
    }
  })
</script>
