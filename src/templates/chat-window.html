<template id="chat-window">
  <div class="card mt-4 mb-4 shadow-sm" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header bg-primary text-white">
      <h5 class="mb-0">Chat</h5>
    </div>
    <div class="card-body bg-light" style="height: 400px; overflow-y: auto;" ref="messageList">
      <!-- Messages will appear here -->
    </div>
    <div class="card-footer">
      <form ref="chatForm" class="d-flex flex-column gap-2">
        <div class="input-group">
          <input type="text" ref="messageInput" class="form-control" placeholder="Type a message..." />
          <button type="submit" class="btn btn-primary">Send</button>
        </div>
        <input type="file" ref="fileInput" class="form-control form-control-sm" />
      </form>
    </div>
  </div>
</template>

<script type="module">
  import { defineComponent } from 'coralite';

  export default defineComponent({
    client: {
      script ({ helpers }) {
        // DOM Refs
        const messageList = helpers.refs('messageList');
        const chatForm = helpers.refs('chatForm');
        const messageInput = helpers.refs('messageInput');
        const fileInput = helpers.refs('fileInput');
        
        // Pocketbase plugin helpers
        const subscribeToMessages = helpers.subscribeToMessages;
        const sendMessage = helpers.sendMessage;

        // 1. Subscribe to real-time database updates
        const unsubscribe = subscribeToMessages((action, record) => {
          if (action === 'create') {
            const msgEl = document.createElement('div');
            msgEl.className = 'p-2 mb-2 bg-white rounded shadow-sm border';
            msgEl.textContent = record.text;
            
            // Note: Add logic here to render the file attachment if it exists
            // We'll leave it simple for now, as asked in the requirements
            if (record.attachment) {
              const fileText = document.createElement('div');
              fileText.className = 'text-muted small mt-1';
              fileText.textContent = `[Attachment: ${record.attachment}]`;
              msgEl.appendChild(fileText);
            }

            messageList.appendChild(msgEl);
            
            // Scroll to bottom
            messageList.scrollTop = messageList.scrollHeight;
          }
        });

        // 2. Handle sending messages and files
        chatForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const text = messageInput.value;
          const file = fileInput.files[0];
          
          if (text || file) {
            // Disable form while sending
            const submitBtn = chatForm.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            
            try {
              await sendMessage(text, file);
              messageInput.value = '';
              fileInput.value = '';
            } catch (error) {
              alert('Failed to send message: ' + error.message);
            } finally {
              submitBtn.disabled = false;
              messageInput.focus();
            }
          }
        });
      }
    }
  });
</script>
