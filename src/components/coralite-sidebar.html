<script type="module" client>
  import { defineComponent } from 'coralite'

  export default defineComponent({
    client: {
      script: ({ helpers }) => {
        const { refs, emit, events, on } = helpers
        const navList = refs('navList')
        const links = navList.querySelectorAll('.nav-link')

        const updateActiveTab = (tabName) => {
          links.forEach(link => {
            if (link.dataset.tab === tabName) {
              link.classList.add('active')
              link.classList.remove('text-white')
              link.setAttribute('aria-current', 'page')
            } else {
              link.classList.remove('active')
              link.classList.add('text-white')
              link.removeAttribute('aria-current')
            }
          })
        }

        links.forEach(link => {
          link.addEventListener('click', (e) => {
            e.preventDefault()
            const tabName = link.dataset.tab
            updateActiveTab(tabName)
            emit(events('nav:changed'), { tab: tabName })
          })
        })

        // Also update if navigation is changed programmatically
        on(events('nav:changed'), ({ tab }) => {
          updateActiveTab(tab)
        })
      }
    }
  })
</script>
