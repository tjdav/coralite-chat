<template id="atoll-chat-input">
  <div class="position-relative w-100">
    <div class="input-group" ref="textInputGroup">
      <input type="file" ref="fileInput" class="d-none">
      <button class="btn btn-outline-secondary border-end-0 rounded-start-pill" type="button" aria-label="Attach File" ref="attachBtn">
        <i class="bi bi-paperclip"></i>
      </button>
      <input type="text" class="form-control border-start-0 border-end-0" placeholder="Aa" aria-label="Type a message" ref="messageInput">
      <button class="btn btn-outline-secondary border-start-0 border-end-0" type="button" aria-label="Record Voice" ref="micBtn">
        <i class="bi bi-mic"></i>
      </button>
      <button class="btn btn-primary rounded-end-pill d-transition-none" type="button" aria-label="Send Message" ref="sendBtn">
        <i class="bi bi-send-fill"></i>
      </button>
    </div>

    <div class="d-transition-none align-items-center w-100" ref="voiceInputGroup">
      <button class="btn btn-link text-decoration-none rounded-circle text-primary me-2 flex-shrink-0 p-0" style="width: 32px; height: 32px;" type="button" aria-label="Cancel Voice Message" ref="cancelVoiceBtn">
        <i class="bi bi-x-circle-fill fs-4"></i>
      </button>
      <div class="flex-grow-1 bg-primary rounded-pill d-flex align-items-center px-2 py-1 position-relative">
        <button class="btn btn-link text-decoration-none text-white rounded-circle bg-white p-0 d-flex align-items-center justify-content-center me-2 flex-shrink-0" style="width: 28px; height: 28px; color: var(--bs-primary) !important;" type="button" aria-label="Stop Recording" ref="actionVoiceBtn">
          <i class="bi bi-stop-fill" ref="actionVoiceIcon"></i>
        </button>
        <div class="flex-grow-1"></div>
        <span class="text-primary bg-white rounded-pill px-2 py-0 fw-bold small me-1 flex-shrink-0" ref="voiceDurationDisplay" style="min-width: 40px; text-align: center;">0:00</span>
      </div>
      <button class="btn btn-link text-decoration-none text-primary ms-2 flex-shrink-0 p-0 d-transition-none" style="width: 32px; height: 32px;" type="button" aria-label="Send Voice Message" ref="sendVoiceBtn">
        <i class="bi bi-send-fill fs-4"></i>
      </button>
    </div>
  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'
export default defineComponent({
  client: {
    script: ({
      helpers
    }) => {
      const {
        refs: references,
        subscribe,
        setState,
        getTypingNotificationsPreference,
        sendTypingStatus
      } = helpers
      const messageInput = references('messageInput')
      const sendButton = references('sendBtn')
      const attachButton = references('attachBtn')
      const fileInput = references('fileInput')
      const micButton = references('micBtn')
      const textInputGroup = references('textInputGroup')
      const voiceInputGroup = references('voiceInputGroup')
      const cancelVoiceBtn = references('cancelVoiceBtn')
      const actionVoiceButton = references('actionVoiceBtn')
      const actionVoiceIcon = references('actionVoiceIcon')
      const voiceDurationDisplay = references('voiceDurationDisplay')
      const sendVoiceBtn = references('sendVoiceBtn')

      let typingTimeout = null
      let isTyping = false
      let activeRoomId = null

      subscribe('activeRoomId', roomId => {
        activeRoomId = roomId
      })

      const handleTyping = async () => {
        const shouldSend = await getTypingNotificationsPreference()

        if (!shouldSend || !activeRoomId) {
          return
        }

        if (!isTyping) {
          isTyping = true
          sendTypingStatus(activeRoomId, true).catch(console.error)
        }

        clearTimeout(typingTimeout)

        typingTimeout = setTimeout(() => {
          isTyping = false
          sendTypingStatus(activeRoomId, false).catch(console.error)
        }, 3000)
      }

      const updateInputButtons = () => {
        const text = messageInput.value.trim()
        if (text) {
          micButton.classList.remove('d-transition-show')
          micButton.classList.add('d-transition-none')
          sendButton.classList.remove('d-transition-none')
          sendButton.classList.add('d-transition-show')
        } else {
          micButton.classList.remove('d-transition-none')
          micButton.classList.add('d-transition-show')
          sendButton.classList.remove('d-transition-show')
          sendButton.classList.add('d-transition-none')
        }
      }

      messageInput.addEventListener('input', () => {
        updateInputButtons()
        handleTyping()
      })

      let mediaRecorder = null
      let audioChunks = []
      let audioBlob = null
      let audioUrl = null
      let timerInterval = null
      let durationSeconds = 0
      let isRecording = false
      let isPaused = false
      let playbackAudio = null
      let isPlaying = false
      const formatDuration = seconds => {
        const m = Math.floor(seconds / 60)
        const s = Math.floor(seconds % 60)
        return `${m}:${s.toString().padStart(2, '0')}`
      }
      const resetVoiceUI = () => {
        clearInterval(timerInterval)
        durationSeconds = 0
        voiceDurationDisplay.textContent = '0:00'
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
          mediaRecorder.stop()
        }
        if (mediaRecorder && mediaRecorder.stream) {
          mediaRecorder.stream.getTracks().forEach(t => t.stop())
        }
        if (playbackAudio) {
          playbackAudio.pause()
          playbackAudio = null
        }
        if (audioUrl) {
          URL.revokeObjectURL(audioUrl)
          audioUrl = null
        }
        mediaRecorder = null
        audioChunks = []
        audioBlob = null
        isRecording = false
        isPaused = false
        isPlaying = false
        actionVoiceIcon.className = 'bi bi-stop-fill'
        sendVoiceBtn.classList.remove('d-transition-show')
        sendVoiceBtn.classList.add('d-transition-none')
        voiceInputGroup.classList.remove('d-transition-show')
        voiceInputGroup.classList.add('d-transition-none')
        voiceInputGroup.classList.remove('d-flex')
        textInputGroup.classList.remove('d-transition-none')
        textInputGroup.classList.add('d-transition-show')
        textInputGroup.classList.add('d-flex')
      }
      const startRecording = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: true
          })

          // Switch UI
          textInputGroup.classList.remove('d-transition-show')
          textInputGroup.classList.add('d-transition-none')
          textInputGroup.classList.remove('d-flex')
          voiceInputGroup.classList.remove('d-transition-none')
          voiceInputGroup.classList.add('d-transition-show')
          voiceInputGroup.classList.add('d-flex')
          actionVoiceIcon.className = 'bi bi-stop-fill'
          sendVoiceBtn.classList.remove('d-transition-show')
          sendVoiceBtn.classList.add('d-transition-none')
          audioChunks = []
          mediaRecorder = new MediaRecorder(stream)
          mediaRecorder.ondataavailable = event => {
            if (event.data.size > 0) {
              audioChunks.push(event.data)
            }
          }
          mediaRecorder.onstop = () => {
            audioBlob = new Blob(audioChunks, {
              type: 'audio/webm'
            })
            audioUrl = URL.createObjectURL(audioBlob)

            // Switch to Review State
            actionVoiceIcon.className = 'bi bi-play-fill'
            sendVoiceBtn.classList.remove('d-transition-none')
            sendVoiceBtn.classList.add('d-transition-show')
            isRecording = false
            isPaused = true
            clearInterval(timerInterval)
          }
          mediaRecorder.start()
          isRecording = true
          isPaused = false
          durationSeconds = 0
          voiceDurationDisplay.textContent = '0:00'
          timerInterval = setInterval(() => {
            durationSeconds++
            voiceDurationDisplay.textContent = formatDuration(durationSeconds)
          }, 1000)
        } catch (error) {
          console.error('Error accessing microphone', error)
          alert('Microphone access denied or not found.')
          resetVoiceUI()
        }
      }
      const toggleVoiceAction = () => {
        if (isRecording) {
          // Stop recording
          mediaRecorder.stop()
          mediaRecorder.stream.getTracks().forEach(t => t.stop())
        } else if (isPaused) {
          // Toggle playback
          if (isPlaying) {
            playbackAudio.pause()
            actionVoiceIcon.className = 'bi bi-play-fill'
            isPlaying = false
          } else {
            if (!playbackAudio) {
              playbackAudio = new Audio(audioUrl)
              playbackAudio.onended = () => {
                actionVoiceIcon.className = 'bi bi-play-fill'
                isPlaying = false
              }
            }
            playbackAudio.play()
            actionVoiceIcon.className = 'bi bi-pause-fill'
            isPlaying = true
          }
        }
      }
      micButton.addEventListener('click', startRecording)
      cancelVoiceBtn.addEventListener('click', resetVoiceUI)
      actionVoiceButton.addEventListener('click', toggleVoiceAction)
      sendVoiceBtn.addEventListener('click', () => {
        if (audioBlob) {
          const fileName = `voice-message-${Date.now()}.webm`
          const file = new File([audioBlob], fileName, {
            type: 'audio/webm'
          })
          setState('triggerFileSelected', {
            file,
            ts: Date.now()
          })

          // Disable voice UI briefly before reset
          sendVoiceBtn.disabled = true
          cancelVoiceBtn.disabled = true
          actionVoiceButton.disabled = true
        }
      })
      const submitMessage = () => {
        const text = messageInput.value.trim()
        if (text) {
          setState('triggerMessageSubmitted', {
            text,
            ts: Date.now()
          })
        }
      }
      sendButton.addEventListener('click', submitMessage)
      attachButton.addEventListener('click', () => {
        fileInput.click()
      })
      fileInput.addEventListener('change', event => {
        const file = event.target.files[0]
        if (file) {
          setState('triggerFileSelected', {
            file,
            ts: Date.now()
          })

          // Disable input while processing
          messageInput.disabled = true
          sendButton.disabled = true
          attachButton.disabled = true

          // Reset the file input so the same file can be selected again
          fileInput.value = ''
        }
      })
      messageInput.addEventListener('keypress', event => {
        if (event.key === 'Enter') {
          submitMessage()
        }
      })
      subscribe('triggerMessageSent', (payload) => {
        if (!payload) {
          return
        }
        messageInput.value = ''
        updateInputButtons()
        messageInput.focus()
      })
      subscribe('triggerFileProcessingDone', (payload) => {
        if (!payload) {
          return
        }
        messageInput.disabled = false
        sendButton.disabled = false
        attachButton.disabled = false
        sendVoiceBtn.disabled = false
        cancelVoiceBtn.disabled = false
        actionVoiceButton.disabled = false
        if (voiceInputGroup.classList.contains('d-flex')) {
          resetVoiceUI()
        } else {
          messageInput.focus()
        }
      })
    }
  }
})
</script>
