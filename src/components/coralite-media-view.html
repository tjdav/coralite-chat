<template id="coralite-media-view">
  <div class="d-flex flex-column h-100 bg-body">
    <!-- Header -->
    <div class="p-3 border-bottom border-secondary bg-body-tertiary d-flex justify-content-between align-items-center">
      <h5 class="m-0 fw-bold" ref="headerTitle">Media</h5>
    </div>
    
    <!-- Content Area -->
    <div class="flex-grow-1 overflow-auto p-3" ref="mediaContentContainer">
      <div ref="picturesGrid" class="d-none h-100">
        <coralite-media-grid type="pictures"></coralite-media-grid>
      </div>
      <div ref="videosGrid" class="d-none h-100">
        <coralite-media-grid type="videos"></coralite-media-grid>
      </div>
      <div ref="musicPlayer" class="d-none h-100">
        <coralite-audio-player></coralite-audio-player>
      </div>
    </div>
  </div>
</template>

<script type="module" client>
  import { defineComponent } from 'coralite'

  export default defineComponent({
    client: {
      script: ({ helpers }) => {
        const { refs, on, events } = helpers
        
        const headerTitle = refs('headerTitle')
        const picturesGrid = refs('picturesGrid')
        const videosGrid = refs('videosGrid')
        const musicPlayer = refs('musicPlayer')

        let currentActiveTab = null

        const renderMediaComponent = (tabName) => {
          if (currentActiveTab === tabName) return
          currentActiveTab = tabName

          picturesGrid.classList.add('d-none')
          videosGrid.classList.add('d-none')
          musicPlayer.classList.add('d-none')

          if (tabName === 'pictures') {
            headerTitle.textContent = 'All Pictures'
            picturesGrid.classList.remove('d-none')
          } else if (tabName === 'videos') {
            headerTitle.textContent = 'All Videos'
            videosGrid.classList.remove('d-none')
          } else if (tabName === 'music') {
            headerTitle.textContent = 'All Music'
            musicPlayer.classList.remove('d-none')
          }
        }

        on(events('nav:changed'), ({ tab }) => {
           if (tab !== 'chats' && tab !== 'requests') {
              renderMediaComponent(tab)
           }
        })
      }
    }
  })
</script>
