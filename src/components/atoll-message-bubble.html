<template id="atoll-message-bubble">
  <div class="d-flex mb-3 position-relative message-wrapper {{ wrapperClass }}" ref="wrapper">
    <div class="message-bubble p-3 rounded-4 shadow-sm position-relative {{ bubbleClass }}" ref="bubble" style="max-width: 75%;">
      <div class="mb-1" ref="body"><slot></slot></div>
      <div class="small {{ timeClass }}" ref="timeDisplay" style="font-size: 0.75rem;">
        {{ time }}
      </div>
      <!-- Transcription -->
      <atoll-transcribe-audio event-id="{{ eventId }}" room-id="{{ roomId }}"></atoll-transcribe-audio>

      <!-- Reactions Pill -->
      <slot name="reactions"></slot>

      <!-- Hover Menu -->
      <div class="position-absolute message-actions-container d-transition-none z-3" ref="actionsContainer">
        <atoll-message-actions event-id="{{ eventId }}" room-id="{{ roomId }}"></atoll-message-actions>
      </div>
    </div>
  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'
export default defineComponent({
  tokens: {
    wrapperClass (values) {
      return values.currentUser === 'true' ? 'justify-content-end' : 'justify-content-start'
    },
    bubbleClass (values) {
      return values.currentUser === 'true' ? 'bg-primary text-white' : 'bg-body-secondary text-body'
    },
    timeClass (values) {
      return values.currentUser === 'true' ? 'text-white-50 text-end' : 'text-muted'
    }
  },
  client: {
    imports: [
      {
        specifier: 'https://unpkg.com/@popperjs/core@2'
      }
    ],
    script: async ({
      helpers,
      values,
      signal
    }) => {
      const {
        refs,
        parseMessage,
        subscribe,
        setState,
        ttsGenerate
      } = helpers
      const wrapper = refs('wrapper')
      const body = refs('body')
      const actionsContainer = refs('actionsContainer')
      const isCurrentUser = values.currentUser === 'true'
      const time = values.time || ''
      const eventId = values.eventId
      const roomId = values.roomId

      let popperInstance = null

      wrapper.addEventListener('mouseenter', () => {
        const timelineElement = document.querySelector(values.chatTimelineRef)

        actionsContainer.classList.remove('d-transition-none')
        actionsContainer.classList.add('d-transition-show')

        if (!popperInstance && window.Popper) {
          popperInstance = window.Popper.createPopper(bubble, actionsContainer, {
            placement: isCurrentUser ? 'left-start' : 'right-start',
            modifiers: [
              {
                name: 'offset',
                options: {
                  offset: [0, 8]
                }
              },
              {
                name: 'preventOverflow',
                options: {
                  boundary: timelineElement
                }
              }
            ]
          })
        }
      }, { signal })

      wrapper.addEventListener('mouseleave', () => {
        actionsContainer.classList.remove('d-transition-show')
        actionsContainer.classList.add('d-transition-none')

        if (popperInstance) {
          popperInstance.destroy()
          popperInstance = null
        }
      }, { signal })

      let currentText = ''

      const processText = () => {
        const slot = body.querySelector('slot')
        const hasAssignedNodes = slot && slot.assignedNodes().length > 0
        const nodes = hasAssignedNodes ? slot.assignedNodes() : body.childNodes
        let shouldParse = true

        for (let i = 0; i < nodes.length; i++) {
          const node = nodes[i]

          if (node.componentId) {
            shouldParse = false
            break
          }
        }

        if (shouldParse) {
          currentText = Array.from(nodes).map(n => n.textContent).join('')

          parseMessage(body, currentText)
        }
      }

      processText()

      // Listen for TTS play requests from the actions menu
      if (ttsGenerate && subscribe) {
        subscribe('triggerTtsPlayRequested', async (data) => {
          if (!data) {
            return
          }
          if (data.eventId === eventId && currentText && currentText.trim() !== '') {
            try {
              const audioBlob = await ttsGenerate(currentText, 'en')
              if (audioBlob) {
                setState('triggerAudioPlay', {
                  file: {
                    id: eventId,
                    blob: audioBlob,
                    name: 'Message TTS Audio'
                  },
                  ts: Date.now()
                })
              }
            } catch (event) {
              console.error('Failed to generate TTS audio:', event)
            }
          }
        })
      }
    }
  }
})
</script>
