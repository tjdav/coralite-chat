<template id="atoll-message-bubble">
  <div class="d-flex mb-3 position-relative message-wrapper" ref="wrapper">
    <div class="message-bubble p-3 rounded-4 shadow-sm position-relative" ref="bubble" style="max-width: 75%;">
      <div class="mb-1" ref="body"><slot></slot></div>
      <div class="small" ref="timeDisplay" style="font-size: 0.75rem;">
      </div>
      
       <!-- Transcription -->
      <atoll-transcribe-audio ref="transcribeContainer"></atoll-transcribe-audio>

      <!-- Reactions Pill -->
      <atoll-message-reactions ref="reactionsContainer"></atoll-message-reactions>

      <!-- Hover Menu -->
      <div class="position-absolute message-actions-container" style="top: -20px; right: -40px; z-index: 10;" ref="actionsContainer">
        <atoll-message-actions></atoll-message-actions>
      </div>
    </div>
  </div>
  <style>
    .message-wrapper:hover .message-actions-container .message-actions {
      display: flex !important;
    }
  </style>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'
export default defineComponent({
  client: {
    components: ['atoll-message-actions', 'atoll-message-reactions', 'atoll-transcribe-audio'],
    script: async ({
      helpers,
      values,
      signal
    }) => {
      const {
        refs: references,
        parseMessage,
        subscribe,
        setState,
        ttsGenerate
      } = helpers
      const wrapper = references('wrapper')
      const bubble = references('bubble')
      const timeDisplay = references('timeDisplay')
      const body = references('body')
      const actionsContainer = references('actionsContainer')
      const reactionsContainer = references('reactionsContainer')
      const transcribeContainer = references('transcribeContainer')

      const isCurrentUser = values['current-user'] === 'true'
      const time = values.time || ''
      const eventId = values['event-id']
      const roomId = values['room-id']
      const initialReactions = values.reactions || {}

      // Pass down properties to child components
      const actionsEl = actionsContainer.querySelector('atoll-message-actions')
      if (actionsEl) {
        actionsEl.values = {
          'event-id': eventId,
          'room-id': roomId
        }
      }
      const reactionsEl = reactionsContainer
      if (reactionsEl) {
        reactionsEl.values = {
          'event-id': eventId,
          'room-id': roomId,
          reactions: initialReactions
        }
      }
      if (isCurrentUser) {
        wrapper.classList.add('justify-content-end')
        bubble.classList.add('bg-primary', 'text-white')
        timeDisplay.classList.add('text-white-50', 'text-end')
        // Align actions left on user messages, align right on other messages
        actionsContainer.style.left = '-40px'
        actionsContainer.style.right = 'auto'
      } else {
        wrapper.classList.add('justify-content-start')
        bubble.classList.add('bg-body-secondary', 'text-body')
        timeDisplay.classList.add('text-muted')
      }
      timeDisplay.textContent = time
      let currentText = ''
      if (parseMessage && body) {
        const slot = body.querySelector('slot')
        const processText = () => {
          let text = ''
          if (values.body) {
            text = values.body
          } else if (slot) {
            const nodes = slot.assignedNodes()
            if (nodes.length > 0) {
              text = Array.from(nodes).map(n => n.textContent).join('')
            }
          } else {
            text = body.textContent || ''
          }
          currentText = text
          if (text && text.trim() !== '') {
            parseMessage(body, text)
          }
        }
        if (slot) {
          slot.addEventListener('slotchange', processText, { signal })
          // also try immediately in case it's already assigned
          processText()
        } else {
          processText()
        }
      }

      // Listen for TTS play requests from the actions menu
      if (ttsGenerate && subscribe) {
        subscribe('triggerTtsPlayRequested', async (data) => {
          if (!data) {
            return
          }
          if (data.eventId === eventId && currentText && currentText.trim() !== '') {
            try {
              const audioBlob = await ttsGenerate(currentText, 'en')
              if (audioBlob) {
                setState('triggerAudioPlay', {
                  file: {
                    id: eventId,
                    blob: audioBlob,
                    name: 'Message TTS Audio'
                  },
                  ts: Date.now()
                })
              }
            } catch (event) {
              console.error('Failed to generate TTS audio:', event)
            }
          }
        })
      }
    }
  }
})
</script>
