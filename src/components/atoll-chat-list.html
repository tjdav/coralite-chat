<template id="atoll-chat-list">
  <div class="d-flex flex-column h-100 bg-body-tertiary max-width-300 w-100">
    <div class="p-3 border-bottom border-secondary d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center">
        <button class="btn btn-sm btn-outline-secondary rounded-circle me-2 d-sm-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu">
          <i class="bi bi-list"></i>
        </button>
        <h5 class="m-0 fw-bold">Chats</h5>
      </div>
      <button class="btn btn-sm btn-outline-secondary rounded-circle" ref="openNewRoomModalBtn" aria-label="New Room">
        <i class="bi bi-pencil-square"></i>
      </button>
    </div>

    <div class="px-3 py-2">
      <div class="input-group">
        <span class="input-group-text bg-body-secondary border-0 rounded-start-pill text-muted" id="search-addon"><i class="bi bi-search"></i></span>
        <input type="text" class="form-control bg-body-secondary border-0 rounded-end-pill" placeholder="Search messages" aria-label="Search messages" aria-describedby="search-addon">
      </div>
    </div>

    <div class="list-group list-group-flush overflow-auto flex-grow-1" ref="roomList">
      <!-- Rooms dynamically generated here -->
    </div>

    <!-- New Room Modal -->
    <div class="modal fade"  tabindex="-1" aria-labelledby="{{ ref_newRoomModalLabel }}" aria-hidden="true" ref="newRoomModal">
      <div class="modal-dialog">
        <div class="modal-content text-bg-dark">
          <form id="{{ ref_createRoomForm }}" ref="createRoomForm">
            <div class="modal-header border-secondary">
              <h1 class="modal-title fs-5" id="{{ ref_newRoomModalLabel }}">Create New Room</h1>
              <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <div class="mb-3">
                <label for="{{ ref_roomNameInput }}" class="form-label">Room Name</label>
                <input type="text" name="name" class="form-control bg-dark text-white border-secondary" ref="roomNameInput" id="{{ ref_roomNameInput  }}" required>
              </div>
              <div class="mb-3">
                <label for="{{ ref_roomPreset }}" class="form-label">Preset</label>
                <select name="preset" class="form-select bg-dark text-white border-secondary" id="{{ ref_roomPreset }}">
                  <option value="private_chat">Private Chat</option>
                  <option value="public_chat">Public Chat</option>
                  <option value="trusted_private_chat">Trusted Private Chat</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="{{ ref_roomVisibility }}" class="form-label">Visibility</label>
                <select name="visibility" class="form-select bg-dark text-white border-secondary" id="{{ ref_roomVisibility }}">
                  <option value="private">Private</option>
                  <option value="public">Public</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="{{ ref_roomTopic }}" class="form-label">Topic</label>
                <input type="text" name="topic" class="form-control bg-dark text-white border-secondary" id="{{ ref_roomTopic }}">
              </div>
              <div class="mb-3 form-check">
                <input type="checkbox" name="is_direct" class="form-check-input" id="{{ ref_isDirectCheck }}">
                <label class="form-check-label" for="{{ ref_isDirectCheck }}">Direct Message</label>
              </div>
              <div class="mb-3 form-check">
                <input type="checkbox" name="enableEncryption" class="form-check-input" id="{{ ref_enableEncryptionCheck }}" checked>
                <label class="form-check-label" for="{{ ref_enableEncryptionCheck }}">Enable Encryption</label>
              </div>
              
              <atoll-invite-users></atoll-invite-users>
            </div>
            <div class="modal-footer border-secondary">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" class="btn btn-primary" ref="createRoomBtn">Create</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'

export default defineComponent({
  client: {
    components: ['atoll-invite-users'],
    imports: [
      {
        specifier: 'bootstrap',
        namedExports: ['Modal']
      }
    ],
    script: ({
      helpers,
      imports
    }) => {
      const {
        refs: references,
        getRooms,
        createRoom,
        subscribe,
        setState,
        getState
      } = helpers
      const { Modal } = imports
      const roomList = references('roomList')
      const newRoomModal = references('newRoomModal')
      const createRoomForm = references('createRoomForm')
      const createRoomBtn = references('createRoomBtn')
      const openNewRoomModalBtn = references('openNewRoomModalBtn')
      const modalInstance = Modal.getOrCreateInstance(newRoomModal)

      openNewRoomModalBtn.addEventListener('click', () => {
        modalInstance.show()
      })

      const updateAvatarNode = (container, roomName, avatarUrl) => {
        if (avatarUrl) {
          let img = container.querySelector('img')
          if (!img) {
            container.replaceChildren()
            img = document.createElement('img')
            img.className = 'rounded-circle me-3'
            img.style.width = '48px'
            img.style.height = '48px'
            img.style.objectFit = 'cover'
            container.appendChild(img)
          }
          if (img.src !== avatarUrl) {
            img.src = avatarUrl
          }
          if (img.alt !== roomName) {
            img.alt = roomName
          }
        } else {
          let div = container.querySelector('div')
          if (!div) {
            container.replaceChildren()
            div = document.createElement('div')
            div.className = 'rounded-circle me-3 bg-secondary text-white d-flex align-items-center justify-content-center fw-bold fs-5'
            div.style.width = '48px'
            div.style.height = '48px'
            div.style.flexShrink = '0'
            container.appendChild(div)
          }
          const initials = roomName ? roomName.substring(0, 2).toUpperCase() : '?'
          if (div.textContent !== initials) {
            div.textContent = initials
          }
        }
      }

      const renderRooms = async () => {
        const rooms = await getRooms()

        const existingNodes = new Map()
        Array.from(roomList.children).forEach(child => {
          existingNodes.set(child.dataset.roomId, child)
        })

        const activeRoomId = getState ? getState('activeRoomId') : null

        rooms.forEach((room, index) => {
          let roomNode = existingNodes.get(room.id)

          if (!roomNode) {
            roomNode = document.createElement('button')
            roomNode.className = 'list-group-item list-group-item-action d-flex align-items-center py-3 bg-transparent border-bottom border-secondary-subtle room-item'
            roomNode.dataset.roomId = room.id

            roomNode.addEventListener('click', () => {
              const allItems = roomList.querySelectorAll('.room-item')
              allItems.forEach(i => i.classList.remove('active', 'bg-body-secondary'))
              roomNode.classList.add('active', 'bg-body-secondary')
              setState('activeRoomId', room.id)
            })

            const avatarContainer = document.createElement('div')
            avatarContainer.className = 'avatar-container d-flex align-items-center'

            const contentContainer = document.createElement('div')
            contentContainer.className = 'flex-grow-1 overflow-hidden'

            const headerContainer = document.createElement('div')
            headerContainer.className = 'd-flex justify-content-between align-items-center mb-1'

            const nameElement = document.createElement('h6')
            nameElement.className = 'mb-0 text-truncate fw-semibold room-name'

            const badgeElement = document.createElement('span')
            badgeElement.className = 'badge rounded-pill text-bg-danger ms-2 unread-badge'

            const messageElement = document.createElement('p')
            messageElement.className = 'mb-0 text-muted small text-truncate mw-300 last-message'

            headerContainer.appendChild(nameElement)
            headerContainer.appendChild(badgeElement)

            contentContainer.appendChild(headerContainer)
            contentContainer.appendChild(messageElement)

            roomNode.appendChild(avatarContainer)
            roomNode.appendChild(contentContainer)
          }

          const avatarContainer = roomNode.querySelector('.avatar-container')
          updateAvatarNode(avatarContainer, room.name, room.avatarUrl)

          const nameElement = roomNode.querySelector('.room-name')
          if (nameElement.textContent !== room.name) {
            nameElement.textContent = room.name
          }

          const badgeElement = roomNode.querySelector('.unread-badge')
          if (room.unreadCount > 0) {
            if (badgeElement.textContent !== String(room.unreadCount)) {
              badgeElement.textContent = room.unreadCount
            }
            if (badgeElement.style.display !== '') {
              badgeElement.style.display = ''
            }
          } else {
            if (badgeElement.textContent !== '') {
              badgeElement.textContent = ''
            }
            if (badgeElement.style.display !== 'none') {
              badgeElement.style.display = 'none'
            }
          }

          const messageElement = roomNode.querySelector('.last-message')
          const lastMessageText = room.lastMessage || 'No recent messages'
          if (messageElement.textContent !== lastMessageText) {
            messageElement.textContent = lastMessageText.substring(0, 100)
          }

          if (activeRoomId === room.id) {
            if (!roomNode.classList.contains('active')) {
              roomNode.classList.add('active', 'bg-body-secondary')
            }
          } else {
            if (roomNode.classList.contains('active')) {
              roomNode.classList.remove('active', 'bg-body-secondary')
            }
          }

          const currentChildAtPos = roomList.children[index]
          if (currentChildAtPos) {
            if (currentChildAtPos !== roomNode) {
              roomList.insertBefore(roomNode, currentChildAtPos)
            }
          } else {
            roomList.appendChild(roomNode)
          }

          existingNodes.delete(room.id)
        })

        existingNodes.forEach(node => node.remove())
      }
      createRoomForm.addEventListener('submit', async (event) => {
        event.preventDefault()
        const formData = new FormData(createRoomForm)

        const options = {
          name: formData.get('name').trim(),
          preset: formData.get('preset'),
          visibility: formData.get('visibility'),
          topic: formData.get('topic').trim(),
          is_direct: formData.get('is_direct') === 'on',
          enableEncryption: formData.get('enableEncryption') === 'on'
        }

        const invitedUsers = formData.get('invitedUsers')
        if (invitedUsers) {
          options.invite = invitedUsers.split(',').map(id => id.trim()).filter(id => id.length > 0)
        }

        if (!options.name) {
          return
        }
        try {
          const loadingSpinner = document.createElement('span')
          const loadingSpinnerStatus = document.createElement('span')

          createRoomBtn.disabled = true
          loadingSpinnerStatus.setAttribute('role', 'status')
          loadingSpinner.setAttribute('class', 'spinner-border spinner-border-sm me-1')
          loadingSpinner.setAttribute('aria-hidden', 'true')

          loadingSpinnerStatus.textContent = 'Loading...'
          createRoomBtn.replaceChildren(loadingSpinner, loadingSpinnerStatus)

          await createRoom(options)

          createRoomForm.reset()
          const inviteComponent = createRoomForm.querySelector('atoll-invite-users')
          if (inviteComponent) {
            inviteComponent.setAttribute('reset', Date.now().toString())
          }

          createRoomBtn.textContent = 'Create'
          createRoomBtn.disabled = false
          modalInstance.hide()

          // Re-render rooms list
          await renderRooms()
        } catch (error) {
          console.error('Failed to create room:', error)
        } finally {
          createRoomBtn.disabled = false
          createRoomBtn.textContent = 'Create'
        }
      })
      subscribe('isLoggedIn', (isLoggedIn) => {
        if (isLoggedIn) {
          renderRooms()
        }
      })
      subscribe('triggerRoomsUpdated', (payload) => {
        if (!payload) {
          return
        }
        renderRooms()
      })
    }
  }
})
</script>
