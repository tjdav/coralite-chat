<template id="atoll-login">
  <div class="d-flex align-items-center justify-content-center vh-100">
    <div class="card p-4" style="width: 400px; max-width: 100%;">
      <h2 class="text-center mb-4">Login to Matrix</h2>
      <form ref="form">
        <div class="form-floating mb-3">
          <input type="url" class="form-control" ref="homeserver" id="{{ ref_homeserver }}" placeholder="Homeserver URL" required>
          <label for="{{ ref_homeserver }}">Homeserver URL</label>
        </div>
        <div class="form-floating mb-3">
          <input type="text" class="form-control" ref="username" id="{{ ref_username }}" placeholder="Username" required>
          <label for="{{ ref_username }}">Username</label>
        </div>
        <div class="form-floating mb-3">
          <input type="password" class="form-control" ref="password" id="{{ ref_password }}" placeholder="Password" required>
          <label for="{{ ref_password }}">Password</label>
        </div>
        <button type="submit" class="btn btn-primary w-100" ref="submitButton">Login</button>
      </form>
      <div class="alert alert-danger mt-3 d-transition-none" role="alert" ref="errorAlert"></div>
      
      <div class="text-center mt-3">
        <a href="#"  class="text-muted text-decoration-none" ref="signupLink">Don't have an account? Sign up.</a>
      </div>
    </div>
  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'
export default defineComponent({
  client: {
    script: ({
      helpers
    }) => {
      const {
        refs: references,
        login,
        sync,
        emit,
        events
      } = helpers
      const form = references('form')
      const homeserverInput = references('homeserver')
      const usernameInput = references('username')
      const passwordInput = references('password')
      const errorAlert = references('errorAlert')
      const submitButton = references('submitButton')
      const signupLink = references('signupLink')
      homeserverInput.value = (helpers.getDefaultHomeserverUrl && helpers.getDefaultHomeserverUrl()) || 'https://matrix.org'
      signupLink.addEventListener('click', event => {
        event.preventDefault()
        emit(events('auth:show-signup'))
      })
      form.addEventListener('submit', async event => {
        event.preventDefault()
        const baseUrl = homeserverInput.value
        const username = usernameInput.value
        const password = passwordInput.value
        errorAlert.classList.remove('d-transition-show')
        errorAlert.classList.add('d-transition-none')
        submitButton.disabled = true
        submitButton.textContent = 'Logging in...'
        try {
          await login({
            baseUrl: baseUrl,
            type: 'm.login.password',
            identifier: {
              type: 'm.id.user',
              user: username
            },
            password: password
          })
          submitButton.textContent = 'Syncing...'
          await sync()
          emit(events('app:logged-in'))
        } catch (error) {
          errorAlert.textContent = 'Login failed. Please check your credentials.'
          errorAlert.classList.remove('d-transition-none')
          errorAlert.classList.add('d-transition-show')
          submitButton.disabled = false
          submitButton.textContent = 'Login'
        }
      })
    }
  }
})
</script>
