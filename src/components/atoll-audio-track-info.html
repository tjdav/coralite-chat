<template id="atoll-audio-track-info">
  <!-- Left: Track Info -->
  <div class="d-flex align-items-center me-3" style="width: 300px;" ref="trackInfoContainer">
    <div class="me-3 text-primary d-flex align-items-center justify-content-center bg-secondary rounded" style="width: 50px; height: 50px;">
      <i class="bi bi-music-note-beamed fs-3 text-white"></i>
    </div>
    <div class="flex-grow-1 overflow-hidden me-2">
      <div class="fw-bold text-truncate" ref="playerTitle" style="font-size: 0.9rem;">Select a track</div>
      <div class="text-muted text-truncate" ref="playerArtist" style="font-size: 0.8rem;">Unknown Artist</div>
    </div>
    <button class="btn btn-link text-white p-1 me-1" ref="likeBtn" title="Like">
      <i class="bi bi-heart" ref="likeIcon"></i>
    </button>
    <button class="btn btn-link text-white p-1 d-transition-none" ref="playerJumpBtn" title="Go to Message">
      <i class="bi bi-chat-left-text"></i>
    </button>
  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'
export default defineComponent({
  client: {
    script: ({
      helpers
    }) => {
      const {
        refs: references,
        on,
        emit,
        events
      } = helpers
      const playerTitle = references('playerTitle')
      const playerArtist = references('playerArtist')
      const likeButton = references('likeBtn')
      const likeIcon = references('likeIcon')
      const playerJumpBtn = references('playerJumpBtn')
      let currentFile = null

      // Listen for track updates
      on(events('player:track-update'), ({
        file,
        isLiked
      }) => {
        currentFile = file
        if (file) {
          playerTitle.textContent = file.filename || 'Unknown File'
          playerArtist.textContent = file.artist || 'Unknown Artist'
          if (file.roomId && file.id) {
            playerJumpBtn.classList.remove('d-transition-none')
            playerJumpBtn.classList.add('d-transition-show')
          } else {
            playerJumpBtn.classList.remove('d-transition-show')
            playerJumpBtn.classList.add('d-transition-none')
          }
          if (isLiked) {
            likeIcon.className = 'bi bi-heart-fill text-danger'
          } else {
            likeIcon.className = 'bi bi-heart text-white'
          }
        } else {
          playerTitle.textContent = 'Select a track'
          playerArtist.textContent = 'Unknown Artist'
          playerJumpBtn.classList.remove('d-transition-show')
          playerJumpBtn.classList.add('d-transition-none')
          likeIcon.className = 'bi bi-heart text-white'
        }
      })

      // Listen for like status updates separately (e.g. user clicks like)
      on(events('player:like-update'), ({
        fileId,
        isLiked
      }) => {
        if (currentFile && currentFile.id === fileId) {
          if (isLiked) {
            likeIcon.className = 'bi bi-heart-fill text-danger'
          } else {
            likeIcon.className = 'bi bi-heart text-white'
          }
        }
      })
      likeButton.addEventListener('click', () => {
        if (currentFile) {
          emit(events('player:toggle-like'), {
            file: currentFile
          })
        }
      })
      playerJumpBtn.addEventListener('click', () => {
        if (currentFile && currentFile.roomId && currentFile.id) {
          emit(events('nav:jump-to-message'), {
            roomId: currentFile.roomId,
            eventId: currentFile.id
          })
        }
      })
    }
  }
})
</script>
