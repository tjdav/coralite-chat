<template id="chat-list">
  <div class="chat-list h-100 overflow-y-auto">
    <div class="list-group list-group-flush" ref="listGroup">
      <!-- Chat items will be rendered here via script -->
    </div>
  </div>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    script: ({ state, signal, $localDb, $bus, $state, refs }) => {
      const listGroup = refs('listGroup')

      const render = async () => {
        if (!listGroup) return

        try {
          const rawItems = await $localDb.local_rooms.reverse().sortBy('updated_at')
          listGroup.innerHTML = ''

          if (rawItems.length === 0) {
            const emptyMsg = document.createElement('div')
            emptyMsg.className = 'p-4 text-center text-muted'
            emptyMsg.textContent = 'No chats found'
            listGroup.appendChild(emptyMsg)
            return
          }

          rawItems.forEach(item => {
            const btn = document.createElement('button')
            btn.type = 'button'
            const isActive = item.id === $state.activeSelectionId
            btn.className = `list-group-item list-group-item-action d-flex align-items-center border-0 py-3 ${isActive ? 'active' : ''}`

            const iconWrapper = document.createElement('div')
            iconWrapper.className = 'list-item-icon'
            const icon = document.createElement('i')
            icon.className = 'bi bi-chat-left-text fs-5'
            iconWrapper.appendChild(icon)

            const contentWrapper = document.createElement('div')
            contentWrapper.className = 'text-truncate'
    
            const nameDiv = document.createElement('div')
            nameDiv.className = 'fw-bold text-truncate'
            nameDiv.textContent = item.name || (item.is_group ? 'Unnamed Group' : 'Direct Message')
    
            const subTextSmall = document.createElement('small')
            subTextSmall.className = 'opacity-75 d-block text-truncate'
            subTextSmall.textContent = item.is_group ? 'Group Chat' : 'Private'

            contentWrapper.appendChild(nameDiv)
            contentWrapper.appendChild(subTextSmall)

            btn.appendChild(iconWrapper)
            btn.appendChild(contentWrapper)

            btn.addEventListener('click', () => {
              $state.activeSelectionId = item.id
              $state.activeSelectionType = 'chats'
            })

            listGroup.appendChild(btn)
          })
        } catch (error) {
          console.error('[chat-list] Error fetching chats:', error)
        }
      }

      // Initial render
      render()

      // Handle selection change
      if (typeof $state.subscribe === 'function') {
        $state.subscribe('activeSelectionId', () => {
          render()
        })
      }

      const handleNewData = () => {
        render()
      }

      $bus.on('NEW_LOCAL_DATA', handleNewData)
      $bus.on('NEW_LOCAL_ROOM', handleNewData)
    }
  })
</script>

<style>
  .list-item-icon {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    background-color: var(--bs-secondary-bg);
    margin-right: 12px;
  }
  .list-group-item.active .list-item-icon {
    background-color: rgba(255, 255, 255, 0.2);
  }
</style>
