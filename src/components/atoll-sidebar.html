<template id="atoll-sidebar">
  <div class="d-flex flex-column justify-content-between h-100 p-3">
    <ul class="nav nav-pills flex-column mb-auto" ref="navList">
      <li class="nav-item mb-2">
        <a href="#" data-tab="chats" class="nav-link active rounded-3 d-flex align-items-center" aria-current="page">
          <i class="bi bi-chat-dots me-3 fs-5"></i>
          Chats
        </a>
      </li>
      <li class="nav-item mb-2 d-none">
        <a href="#" data-tab="requests" class="nav-link text-white rounded-3 d-flex align-items-center">
          <i class="bi bi-person-lines-fill me-3 fs-5"></i>
          Requests
        </a>
      </li>
      <li class="nav-item mb-2">
        <a href="#" data-tab="music" class="nav-link text-white rounded-3 d-flex align-items-center">
          <i class="bi bi-music-note-beamed me-3 fs-5"></i>
          Music
        </a>
      </li>
      <li class="nav-item mb-2">
        <a href="#" data-tab="pictures" class="nav-link text-white rounded-3 d-flex align-items-center">
          <i class="bi bi-images me-3 fs-5"></i>
          Pictures
        </a>
      </li>
      <li class="nav-item mb-2">
        <a href="#" data-tab="videos" class="nav-link text-white rounded-3 d-flex align-items-center">
          <i class="bi bi-camera-video me-3 fs-5"></i>
          Videos
        </a>
      </li>
    </ul>

    <div class="mt-auto border-top border-secondary pt-3">
      <button class="btn btn-outline-light w-100 mb-2 d-flex align-items-center justify-content-center" type="button" aria-label="Settings" ref="settingsBtn">
        <i class="bi bi-gear me-2"></i> Settings
      </button>
      <div class="dropdown">
        <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" id="dropdownUser1" data-bs-toggle="dropdown" aria-expanded="false">
          <div class="rounded-circle bg-secondary d-flex align-items-center justify-content-center me-2" style="width: 32px; height: 32px;">
            <span>U</span>
          </div>
          <strong>User</strong>
        </a>
        <ul class="dropdown-menu dropdown-menu-dark text-small shadow" aria-labelledby="dropdownUser1">
          <li><a class="dropdown-item" href="#">Profile</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item" href="#" ref="lockAppLink"><i class="bi bi-lock me-2"></i>Lock App</a></li>
          <li><a class="dropdown-item" href="#" ref="signOutLink"><i class="bi bi-box-arrow-right me-2"></i>Sign out</a></li>
        </ul>
      </div>
    </div>
  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'
export default defineComponent({
  client: {
    script: ({
      helpers
    }) => {
      const {
        refs: references,
        subscribe,
        setState,
        logout
      } = helpers
      const lockAppLink = references('lockAppLink')
      lockAppLink.addEventListener('click', async event => {
        event.preventDefault()
        if (helpers.crypto().lockApp) {
          await helpers.crypto().lockApp()
        }
        setState('isLoggedIn', false)
      })

      const signOutLink = references('signOutLink')
      signOutLink.addEventListener('click', async event => {
        event.preventDefault()
        if (logout) {
          await logout()
        }
        setState('isLoggedIn', false)
      })
      const settingsBtn = references('settingsBtn')
      settingsBtn.addEventListener('click', () => {
        setState('activeNavTab', 'settings')
      })
      const navList = references('navList')
      const links = navList.querySelectorAll('.nav-link')
      const updateActiveTab = tabName => {
        links.forEach(link => {
          if (link.dataset.tab === tabName) {
            link.classList.add('active')
            link.classList.remove('text-white')
            link.setAttribute('aria-current', 'page')
          } else {
            link.classList.remove('active')
            link.classList.add('text-white')
            link.removeAttribute('aria-current')
          }
        })
      }
      links.forEach(link => {
        link.addEventListener('click', event => {
          event.preventDefault()
          const tabName = link.dataset.tab
          setState('activeNavTab', tabName)
        })
      })

      // update if navigation is changed programmatically
      subscribe('activeNavTab', (tab) => {
        if (!tab) {
          return
        }
        updateActiveTab(tab)
      })
    }
  }
})
</script>
