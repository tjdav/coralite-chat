<template id="coralite-chat-window">
  <div class="d-flex flex-column h-100 bg-body">
    <!-- Header Placeholder -->
    <div class="p-3 border-bottom border-secondary d-flex justify-content-between align-items-center bg-body-tertiary" ref="chatHeader" style="display: none !important;">
      <div class="d-flex align-items-center">
        <div ref="roomAvatar" class="me-3"></div>
        <h5 class="m-0 fw-bold" ref="roomName">Select a chat</h5>
      </div>
      <div>
        <button class="btn btn-sm btn-outline-secondary rounded-circle me-2" ref="startVoiceCallBtn"><i class="bi bi-telephone"></i></button>
        <button class="btn btn-sm btn-outline-secondary rounded-circle me-2" ref="startVideoCallBtn"><i class="bi bi-camera-video"></i></button>
        <button class="btn btn-sm btn-outline-secondary rounded-circle"><i class="bi bi-three-dots"></i></button>
      </div>
    </div>

    <!-- Empty State -->
    <div class="flex-grow-1 d-flex justify-content-center align-items-center flex-column text-muted" ref="emptyState">
      <i class="bi bi-chat-left-dots" style="font-size: 4rem;"></i>
      <h4 class="mt-3">Your Messages</h4>
      <p>Select a chat or start a new conversation.</p>
    </div>

    <!-- Timeline (Hidden Initially) -->
    <coralite-chat-timeline class="flex-grow-1 overflow-auto d-none" ref="timeline"></coralite-chat-timeline>

    <!-- Input (Hidden Initially) -->
    <div class="p-3 border-top border-secondary bg-body-tertiary d-none" ref="inputContainer">
      <coralite-chat-input></coralite-chat-input>
    </div>
  </div>
</template>

<script type="module" client>
  import { defineComponent } from 'coralite'

  export default defineComponent({
    client: {
      imports: [
        { specifier: 'coralite-component/coralite-chat-timeline' },
        { specifier: 'coralite-component/coralite-chat-input' }
      ],
      script: ({ helpers }) => {
        const { refs, on, emit, events, getRoom, sendMessage, seed, sendTorrentMessage } = helpers
        const chatHeader = refs('chatHeader')
        const roomAvatar = refs('roomAvatar')
        const roomName = refs('roomName')
        const emptyState = refs('emptyState')
        const timeline = refs('timeline')
        const inputContainer = refs('inputContainer')
        const startVoiceCallBtn = refs('startVoiceCallBtn')
        const startVideoCallBtn = refs('startVideoCallBtn')

        let activeRoomId = null

        startVoiceCallBtn.addEventListener('click', () => {
          if (activeRoomId) {
            emit(events('call:start'), { roomId: activeRoomId, type: 'voice' })
          }
        })

        startVideoCallBtn.addEventListener('click', () => {
          if (activeRoomId) {
            emit(events('call:start'), { roomId: activeRoomId, type: 'video' })
          }
        })

        const createAvatarHTML = (name, url) => {
          if (url) {
            return '<img src="' + url + '" alt="' + name + '" class="rounded-circle" style="width: 40px; height: 40px; object-fit: cover;">'
          }

          const initials = name ? name.substring(0, 2).toUpperCase() : '?'
          return '<div class="rounded-circle bg-secondary text-white d-flex align-items-center justify-content-center fw-bold fs-6" style="width: 40px; height: 40px;">' + initials + '</div>'
        }

        on(events('chat:room-selected'), async ({ roomId }) => {
          activeRoomId = roomId
          const roomDetails = await getRoom(roomId)

          if (roomDetails) {
            roomName.textContent = roomDetails.name
            roomAvatar.innerHTML = createAvatarHTML(roomDetails.name, roomDetails.avatarUrl)

            // Show UI elements
            chatHeader.style.display = 'flex'
            emptyState.classList.add('d-none')
            timeline.classList.remove('d-none')
            inputContainer.classList.remove('d-none')

            // Notify timeline to load messages
            emit(events('chat:room-ready'), { roomId })
          }
        })

        on(events('chat:message-submitted'), async ({ text }) => {
          if (!activeRoomId) return

          try {
            await sendMessage(activeRoomId, text)
            emit(events('chat:message-sent'))
          } catch (error) {
            console.error('Failed to send message:', error)
          }
        })

        on(events('chat:file-selected'), async ({ file }) => {
          if (!activeRoomId) return

          try {
            // 1. Generate AES-GCM key
            const key = await crypto.subtle.generateKey(
              {
                name: 'AES-GCM',
                length: 256
              },
              true,
              ['encrypt', 'decrypt']
            )

            // 2. Generate IV
            const iv = crypto.getRandomValues(new Uint8Array(12))

            // 3. Encrypt file
            const fileBuffer = await file.arrayBuffer()
            const encryptedBuffer = await crypto.subtle.encrypt(
              {
                name: 'AES-GCM',
                iv: iv
              },
              key,
              fileBuffer
            )
            const encryptedBlob = new Blob([encryptedBuffer])

            // 4. Start Seeding
            const magnetURI = await seed(encryptedBlob)

            // 5. Export Key to JWK and IV to Base64
            const jwk = await crypto.subtle.exportKey('jwk', key)
            const base64Iv = btoa(Array.from(iv, (byte) => String.fromCodePoint(byte)).join(''))

            // 6. Send Matrix Signal
            const torrentPayload = {
              magnetURI,
              key: jwk,
              iv: base64Iv,
              filename: file.name,
              size: file.size,
              mimeType: file.type || 'application/octet-stream'
            }

            await sendTorrentMessage(activeRoomId, torrentPayload)

          } catch (error) {
            console.error('Failed to process and send file:', error)
          } finally {
            // 7. Re-enable UI
            emit(events('chat:file-processing-done'))
          }
        })
      }
    }
  })
</script>
