<template id="atoll-password-prompt">
  <div class="modal fade" tabindex="-1" role="dialog" aria-modal="true" ref="passwordPromptModal">
    <div class="modal-dialog modal-dialog-centered m-auto">
      <div class="modal-content shadow">
        <div class="modal-header border-bottom border-secondary">
          <h5 class="modal-title">Unlock Secret Storage</h5>
        </div>
        <div class="modal-body">
          <p class="text-muted small mb-3">Please enter your recovery key or password to unlock encrypted messages.</p>
          <form ref="passwordForm">
            <div class="form-floating mb-3">
              <input type="password" class="form-control" ref="passwordInput" id="{{ ref_passwordInput }}" placeholder="Password / Recovery Key" required>
              <label for="{{ ref_passwordInput }}">Password / Recovery Key</label>
            </div>
            <div class="d-flex justify-content-end">
              <button type="submit" class="btn btn-primary" ref="submitButton">Unlock</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'

export default defineComponent({
  client: {
    imports: [
      {
        specifier: 'bootstrap',
        namedExports: ['Modal']
      }
    ],
    script: ({
      imports,
      helpers,
      signal
    }) => {
      const { Modal } = imports
      const {
        refs: references,
        subscribe,
        setState
      } = helpers

      const passwordPromptModal = references('passwordPromptModal')
      const passwordForm = references('passwordForm')
      const passwordInput = references('passwordInput')
      const modalInstance = new Modal(passwordPromptModal, {
        backdrop: 'static',
        keyboard: false
      })

      let activePromptId = null

      const hideModal = () => {
        modalInstance.hide()
        passwordForm.reset()
        activePromptId = null
      }

      subscribe('triggerPasswordPrompt', (payload) => {
        if (!payload) {
          return
        }
        activePromptId = payload.promptId

        modalInstance.show()
        passwordPromptModal.addEventListener('shown.bs.modal', () => {
          passwordInput.focus()
        }, {
          once: true,
          signal
        })
      }, { signal })

      passwordForm.addEventListener('submit', (event) => {
        event.preventDefault()

        if (!activePromptId) {
          return
        }

        const password = passwordInput.value

        setState('triggerPasswordPromptResolved', {
          promptId: activePromptId,
          password,
          ts: Date.now()
        })

        hideModal()
      }, { signal })
    }
  }
})
</script>
