<template id="chat-view">
  <div class="chat-view d-flex flex-column h-100 bg-body">
    <!-- Chat Header -->
    <header class="p-3 border-bottom d-flex justify-content-between align-items-center bg-body shadow-sm" ref="chatHeader">
      <div class="d-flex align-items-center">
        <div class="avatar-placeholder me-3 bg-primary-subtle text-primary rounded-circle d-flex align-items-center justify-content-center fw-bold" style="width: 40px; height: 40px;">
          {{ roomInitial }}
        </div>
        <div>
          <h6 class="mb-0 fw-bold">{{ roomName }}</h6>
          <small class="text-muted">{{ roomStatus }}</small>
        </div>
      </div>
      <div class="d-flex gap-2">
        <button ref="btnAudioCall" class="btn btn-light btn-sm rounded-circle" title="Audio Call">
          <i class="bi bi-telephone"></i>
        </button>
        <button ref="btnVideoCall" class="btn btn-light btn-sm rounded-circle" title="Video Call">
          <i class="bi bi-camera-video"></i>
        </button>
        <button class="btn btn-outline-secondary btn-sm rounded-pill px-3" ref="btnDetails">
          <i class="bi bi-info-circle me-1"></i> Details
        </button>
      </div>
    </header>

    <!-- Main Content Area -->
    <div class="flex-grow-1 position-relative overflow-hidden">
      <!-- Message Timeline -->
      <message-timeline></message-timeline>

      <!-- Room Details Sidebar (Slide-over) -->
      <div ref="sidebarContainer" class="sidebar-slide-over shadow-lg border-start bg-body" style="display: {{ sidebarDisplay }};">
        <room-details-sidebar></room-details-sidebar>
      </div>
    </div>

    <!-- Chat Input -->
    <chat-input></chat-input>
  </div>
</template>

<style>
  .chat-view {
    height: 100%;
  }
  .sidebar-slide-over {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    width: 350px;
    z-index: 1050;
    transition: transform 0.3s ease-in-out;
  }
  .avatar-placeholder {
    font-size: 1.2rem;
  }
</style>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    data: () => ({
      roomName: 'Loading...',
      roomInitial: '?',
      roomStatus: 'Encrypted',
      isRoomDetailsOpen: false
    }),
    getters: {
      sidebarDisplay: (state) => (state.isRoomDetailsOpen ? 'block' : 'none')
    },
    script: async ({ refs, state, $state, $localDb, $bus, $webrtc }) => {
      state.isRoomDetailsOpen = $state.isRoomDetailsOpen || false

      const webrtc = await $webrtc()

      const updateRoomInfo = async (roomId) => {
        if (!roomId) {
          return
        }
  
        try {
          const db = await $localDb()
          const room = await db.local_rooms.get(roomId)
          if (room) {
            state.roomName = room.name || (room.is_group ? 'Unnamed Group' : 'Direct Message')
            state.roomInitial = state.roomName.charAt(0).toUpperCase()
            state.roomStatus = room.is_group ? 'Group Chat' : 'Private'
          }
        } catch (err) {
          console.error('[chat-view] Failed to load room info:', err)
        }
      }

      // Initial load
      updateRoomInfo($state.activeSelectionId)

      // Watch for room changes
      if (typeof $state.subscribe === 'function') {
        $state.subscribe('activeSelectionId', (val) => {
          updateRoomInfo(val)
          // Close details when switching rooms
          state.isRoomDetailsOpen = false
          $state.isRoomDetailsOpen = false
        })

        $state.subscribe('isRoomDetailsOpen', (val) => {
          state.isRoomDetailsOpen = val
        })
      }

      const btnDetails = refs('btnDetails')
      if (btnDetails) {
        btnDetails.addEventListener('click', () => {
          state.isRoomDetailsOpen = !state.isRoomDetailsOpen
          $state.isRoomDetailsOpen = state.isRoomDetailsOpen
        })
      }

      $bus.on('close-room-details', () => {
        state.isRoomDetailsOpen = false
        $state.isRoomDetailsOpen = false
      })

      const initiateCall = async (video = true) => {
        if ($state.callStatus !== 'idle') {
          return
        }

        try {
          const localStream = await navigator.mediaDevices.getUserMedia({
            audio: true,
            video
          })
  
          /**
           * @todo We'll need a way to pass this stream to the call-overlay.
           * Since call-overlay is global and reacts to callStatus, we can use $bus or shared state.
           * For now, let's assume call-overlay will fetch its own stream or we pass it via a custom event.
           */
  
          $state.activeCallRoomId = $state.activeSelectionId
          $state.callStatus = 'active'
  
          // Emit event so call-overlay can pick up the localStream we just created
          $bus.emit('call_initiated_locally', { localStream })
  
          await webrtc.initiateCall($state.activeCallRoomId, localStream)
        } catch (err) {
          console.error('[chat-view] Failed to initiate call:', err)
        }
      }

      refs('btnAudioCall').addEventListener('click', () => initiateCall(false))
      refs('btnVideoCall').addEventListener('click', () => initiateCall(true))
    }
  })
</script>
