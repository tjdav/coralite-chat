<template id="atoll-media-view">
  <div class="d-flex flex-column h-100 bg-body">
    <!-- Header -->
    <div class="p-3 border-bottom border-secondary bg-body-tertiary d-flex justify-content-between align-items-center">
      <h5 class="m-0 fw-bold" ref="headerTitle">Media</h5>
    </div>
    
    <!-- Content Area -->
    <div class="flex-grow-1 overflow-auto p-3" ref="mediaContentContainer">
      <div ref="picturesGrid" class="d-transition-none h-100">
        <atoll-media-grid type="pictures"></atoll-media-grid>
      </div>
      <div ref="videosGrid" class="d-transition-none h-100">
        <atoll-media-grid type="videos"></atoll-media-grid>
      </div>
      <div ref="musicPlayer" class="d-transition-none h-100">
        <atoll-audio></atoll-audio>
      </div>
    </div>
  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'
export default defineComponent({
  client: {
    script: ({
      helpers
    }) => {
      const {
        refs: references,
        on,
        events
      } = helpers
      const headerTitle = references('headerTitle')
      const picturesGrid = references('picturesGrid')
      const videosGrid = references('videosGrid')
      const musicPlayer = references('musicPlayer')
      let currentActiveTab = null
      const renderMediaComponent = tabName => {
        if (currentActiveTab === tabName) {
          return
        }
        currentActiveTab = tabName
        picturesGrid.classList.remove('d-transition-show')
        picturesGrid.classList.add('d-transition-none')
        videosGrid.classList.remove('d-transition-show')
        videosGrid.classList.add('d-transition-none')
        musicPlayer.classList.remove('d-transition-show')
        musicPlayer.classList.add('d-transition-none')
        if (tabName === 'pictures') {
          headerTitle.textContent = 'All Pictures'
          picturesGrid.classList.remove('d-transition-none')
          picturesGrid.classList.add('d-transition-show')
        } else if (tabName === 'videos') {
          headerTitle.textContent = 'All Videos'
          videosGrid.classList.remove('d-transition-none')
          videosGrid.classList.add('d-transition-show')
        } else if (tabName === 'music') {
          headerTitle.textContent = 'All Music'
          musicPlayer.classList.remove('d-transition-none')
          musicPlayer.classList.add('d-transition-show')
        }
      }
      on(events('nav:changed'), ({
        tab
      }) => {
        if (tab !== 'chats' && tab !== 'requests') {
          renderMediaComponent(tab)
        }
      })
    }
  }
})
</script>
