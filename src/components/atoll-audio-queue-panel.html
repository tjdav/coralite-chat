<template id="atoll-audio-queue-panel">
  <!-- Queue Panel -->
  <div ref="queuePanel" class="position-absolute end-0 bottom-100 bg-dark border border-secondary rounded-top d-transition-none flex-column overflow-hidden" style="width: 350px; max-height: 400px; z-index: 1060; margin-bottom: 2px;">
    <div class="d-flex justify-content-between align-items-center p-2 border-bottom border-secondary bg-black bg-opacity-25">
      <h6 class="m-0 ms-2 text-white">Play Queue</h6>
      <button class="btn btn-link text-white p-1 text-decoration-none" title="Close Queue" ref="closeQueueBtn">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
    <div class="list-group list-group-flush flex-grow-1 overflow-auto" ref="queueList">
      <!-- Queue items go here -->
    </div>
  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'
export default defineComponent({
  client: {
    script: ({
      helpers
    }) => {
      const {
        refs: references,
        subscribe,
        setState
      } = helpers
      const queuePanel = references('queuePanel')
      const closeQueueBtn = references('closeQueueBtn')
      const queueList = references('queueList')
      let currentPlaylist = []
      let currentIndex = -1
      const formatTime = seconds => {
        if (isNaN(seconds) || seconds < 0) {
          return '0:00'
        }
        const m = Math.floor(seconds / 60)
        const s = Math.floor(seconds % 60)
        return `${m}:${s.toString().padStart(2, '0')}`
      }
      const renderQueue = () => {
        queueList.replaceChildren()
        currentPlaylist.forEach((file, index) => {
          const button = document.createElement('button')
          button.className = `list-group-item list-group-item-action bg-transparent text-white border-secondary p-2 d-flex align-items-center ${index === currentIndex ? 'active bg-primary border-primary' : ''}`
          const icon = document.createElement('i')
          icon.className = index === currentIndex ? 'bi bi-volume-up-fill me-3 text-white' : 'bi bi-music-note me-3 text-secondary'
          const infoDiv = document.createElement('div')
          infoDiv.className = 'flex-grow-1 overflow-hidden d-flex flex-column'
          const titleDiv = document.createElement('div')
          titleDiv.className = 'text-truncate fw-bold'
          titleDiv.style.fontSize = '0.9rem'
          titleDiv.textContent = file.filename || 'Unknown File'
          const metaDiv = document.createElement('div')
          metaDiv.className = 'd-flex justify-content-between text-muted text-truncate'
          metaDiv.style.fontSize = '0.75rem'
          const artistSpan = document.createElement('span')
          artistSpan.textContent = file.artist || 'Unknown Artist'
          const durationSpan = document.createElement('span')
          // Mock duration or format file size if no duration is known.
          durationSpan.textContent = file.duration ? formatTime(file.duration) : ''
          metaDiv.appendChild(artistSpan)
          metaDiv.appendChild(durationSpan)
          infoDiv.appendChild(titleDiv)
          infoDiv.appendChild(metaDiv)
          button.appendChild(icon)
          button.appendChild(infoDiv)
          button.addEventListener('click', () => {
            setState('triggerPlayQueueTrack', {
              index,
              file,
              ts: Date.now()
            })
          })
          queueList.appendChild(button)
        })

        // Scroll current item into view if possible
        const activeItem = queueList.querySelector('.active')
        if (activeItem) {
          activeItem.scrollIntoView({
            block: 'nearest'
          })
        }
      }
      subscribe('playerQueueState', (payload) => {
        if (!payload) {
          return
        }
        currentPlaylist = payload.playlist
        currentIndex = payload.index
        if (!queuePanel.classList.contains('d-transition-none')) {
          renderQueue()
        }
      })
      subscribe('playerIsQueueVisible', (isVisible) => {
        if (isVisible === undefined) {
          return
        }
        if (isVisible) {
          queuePanel.classList.remove('d-transition-none')
          queuePanel.classList.add('d-transition-show')
          queuePanel.classList.add('d-flex')
          renderQueue()
        } else {
          queuePanel.classList.remove('d-transition-show')
          queuePanel.classList.add('d-transition-none')
          queuePanel.classList.remove('d-flex')
        }
      })
      closeQueueBtn.addEventListener('click', () => {
        setState('triggerCloseQueue', { ts: Date.now() })
      })
    }
  }
})
</script>
