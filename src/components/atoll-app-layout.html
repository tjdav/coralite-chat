<template id="atoll-app-layout">
  <div class="d-flex vh-100 overflow-hidden layout-container" ref="layoutContainer">
    <!-- Left Sidebar Column -->
    <div class="offcanvas-sm offcanvas-start w-250px bg-dark text-white d-flex flex-column border-end border-secondary app-sidebar-col" tabindex="-1" id="sidebarMenu" aria-labelledby="sidebarMenuLabel">
      <div class="offcanvas-header d-sm-none border-bottom border-secondary">
        <h5 class="offcanvas-title" id="sidebarMenuLabel">Menu</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body flex-column h-100 p-0 overflow-hidden">
        <atoll-sidebar></atoll-sidebar>
      </div>
    </div>
    
    <!-- Middle Column: Chat List -->
    <div class="max-width-600 border-end border-secondary d-flex flex-column h-100 app-chat-list-col" ref="chatListContainer">
      <atoll-chat-list></atoll-chat-list>
    </div>
    
    <!-- Right Column: Chat Window -->
    <div class="flex-grow-1 d-flex flex-column h-100 bg-body app-chat-window-col" ref="chatWindowContainer">
      <atoll-chat-window></atoll-chat-window>
    </div>
    
    <!-- Settings Column -->
    <div class="flex-grow-1 d-transition-none flex-column h-100 bg-body overflow-hidden" ref="settingsContainer">
      <atoll-settings></atoll-settings>
    </div>
    
    <!-- Media View Column -->
    <div class="flex-grow-1 d-transition-none flex-column h-100 bg-body overflow-hidden" ref="mediaViewContainer">
      <atoll-media-view></atoll-media-view>
    </div>
    
    <!-- Video Call Overlay -->
    <atoll-video-call></atoll-video-call>
    
    <!-- Global Audio Player -->
    <atoll-audio-player></atoll-audio-player>

    <!-- Password Prompt Modal -->
    <atoll-password-prompt></atoll-password-prompt>
    
    <!-- Incoming Call Toast/Modal (Ringing) -->
    <div class="modal fade" tabindex="-1" role="dialog" aria-modal="true" ref="incomingCallModal" style="display: none; background: rgba(0,0,0,0.5);">
      <div class="modal-dialog modal-sm modal-dialog-centered m-auto">
        <div class="modal-content shadow">
          <div class="modal-body text-center p-4">
            <div class="mb-3">
              <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center mx-auto mb-2" style="width: 60px; height: 60px;" ref="callerAvatar">
                <i class="bi bi-person fs-3"></i>
              </div>
              <h5 class="mb-1" ref="callerName">Incoming Call...</h5>
              <p class="text-muted small mb-0">Video Call</p>
            </div>
            <div class="d-flex justify-content-center gap-3 mt-4">
              <button class="btn btn-danger rounded-circle" style="width: 50px; height: 50px;" ref="declineCallBtn" title="Decline">
                <i class="bi bi-telephone-x-fill"></i>
              </button>
              <button class="btn btn-success rounded-circle" style="width: 50px; height: 50px;" ref="acceptCallBtn" title="Accept">
                <i class="bi bi-telephone-fill"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'
export default defineComponent({
  client: {
    components: ['atoll-settings', 'atoll-password-prompt'],
    script: ({
      helpers
    }) => {
      const {
        refs: references,
        subscribe,
        setState,
        placeCall,
        getRoom
      } = helpers
      const chatListContainer = references('chatListContainer')
      const chatWindowContainer = references('chatWindowContainer')
      const mediaViewContainer = references('mediaViewContainer')
      const settingsContainer = references('settingsContainer')
      const layoutContainer = references('layoutContainer')

      // Toggle layout class based on whether a chat is active
      subscribe('activeRoomId', (roomId) => {
        if (roomId) {
          layoutContainer.classList.add('chat-active')
        } else {
          layoutContainer.classList.remove('chat-active')
        }
      })

      // Listen for navigation changes from the sidebar
      subscribe('activeNavTab', (tab) => {
        if (!tab) {
          return
        }
        if (tab === 'chats') {
          // Show chat columns, hide media view & settings
          chatListContainer.classList.remove('d-transition-none')
          chatListContainer.classList.add('d-transition-show')
          chatWindowContainer.classList.remove('d-transition-none')
          chatWindowContainer.classList.add('d-transition-show')
          mediaViewContainer.classList.remove('d-transition-show')
          mediaViewContainer.classList.add('d-transition-none')
          mediaViewContainer.classList.remove('d-flex')
          settingsContainer.classList.remove('d-transition-show')
          settingsContainer.classList.add('d-transition-none')
          settingsContainer.classList.remove('d-flex')
        } else if (tab === 'settings') {
          // Hide chat columns & media view, show settings
          chatListContainer.classList.remove('d-transition-show')
          chatListContainer.classList.add('d-transition-none')
          chatWindowContainer.classList.remove('d-transition-show')
          chatWindowContainer.classList.add('d-transition-none')
          mediaViewContainer.classList.remove('d-transition-show')
          mediaViewContainer.classList.add('d-transition-none')
          mediaViewContainer.classList.remove('d-flex')
          settingsContainer.classList.remove('d-transition-none')
          settingsContainer.classList.add('d-transition-show')
          settingsContainer.classList.add('d-flex')
        } else {
          // Hide chat columns & settings, show media view
          chatListContainer.classList.remove('d-transition-show')
          chatListContainer.classList.add('d-transition-none')
          chatWindowContainer.classList.remove('d-transition-show')
          chatWindowContainer.classList.add('d-transition-none')
          settingsContainer.classList.remove('d-transition-show')
          settingsContainer.classList.add('d-transition-none')
          settingsContainer.classList.remove('d-flex')
          mediaViewContainer.classList.remove('d-transition-none')
          mediaViewContainer.classList.add('d-transition-show')
          mediaViewContainer.classList.add('d-flex')
        }
      })

      // Listen for "Go to Message" requests from the media view
      subscribe('triggerJumpToMessage', (payload) => {
        if (!payload) {
          return
        }
        const { roomId, eventId } = payload

        // Switch tab back to 'chats'
        setState('activeNavTab', 'chats')

        // Open the specific room
        setState('activeRoomId', roomId)

        // Tell the timeline to scroll to the specific message.
        setState('targetScrollEventId', {
          eventId,
          ts: Date.now()
        })
      })

      /**
      *  Video Call Logic
      */
      const incomingCallModal = references('incomingCallModal')
      const callerName = references('callerName')
      const callerAvatar = references('callerAvatar')
      const acceptCallBtn = references('acceptCallBtn')
      const declineCallBtn = references('declineCallBtn')
      let activeIncomingCall = null
      let isIncomingCallModalOpen = false
      const hideIncomingModal = () => {
        isIncomingCallModalOpen = false
        incomingCallModal.classList.remove('show')
        setTimeout(() => {
          incomingCallModal.style.display = 'none'
        }, 150)
        activeIncomingCall = null
      }
      const showIncomingModal = async call => {
        activeIncomingCall = call
        isIncomingCallModalOpen = true
        const room = await getRoom(call.roomId)
        callerName.textContent = room ? room.name : 'Unknown Caller'
        if (room && room.avatarUrl) {
          const img = document.createElement('img')
          img.src = room.avatarUrl
          img.alt = room.name
          img.className = 'rounded-circle w-100 h-100 object-fit-cover'
          callerAvatar.replaceChildren(img)
          callerAvatar.classList.remove('bg-primary')
        } else {
          const icon = document.createElement('i')
          icon.className = 'bi bi-person fs-3'
          callerAvatar.replaceChildren(icon)
          callerAvatar.classList.add('bg-primary')
        }
        incomingCallModal.style.display = 'block'
        setTimeout(() => incomingCallModal.classList.add('show'), 10)
      }

      // Outbound: User initiates a call
      subscribe('triggerCallStart', async (payload) => {
        if (!payload) {
          return
        }
        const { roomId, type } = payload
        try {
          const call = await placeCall(roomId, type)
          setState('activeCall', call)
        } catch (error) {
          console.error('Failed to start call:', error)
        }
      })

      // Inbound: WebRTC Signaling detects a call
      subscribe('triggerCallIncoming', (payload) => {
        if (!payload) {
          return
        }
        const { call } = payload
        // Check if already in a call or already showing a modal
        if (isIncomingCallModalOpen) {
          // Already ringing, auto reject or ignore
          call.reject().catch(() => {
          })
          return
        }
        showIncomingModal(call)
      })

      // UI Interactions for incoming call
      acceptCallBtn.addEventListener('click', async () => {
        if (!activeIncomingCall) {
          return
        }
        try {
          const peerConnection = await activeIncomingCall.answer()
          setState('activeCall', peerConnection)
          hideIncomingModal()
        } catch (error) {
          console.error('Failed to answer call:', error)
          hideIncomingModal()
        }
      })
      declineCallBtn.addEventListener('click', async () => {
        if (!activeIncomingCall) {
          return
        }
        try {
          await activeIncomingCall.reject()
        } catch (error) {
          console.error('Failed to decline call:', error)
        } finally {
          hideIncomingModal()
        }
      })
    }
  }
})
</script>
