<template id="atoll-message-actions">
  <nav class="message-actions bg-dark border border-secondary rounded-pill shadow-sm d-flex align-items-center px-2 py-1 gap-1" ref="container">
    <button class="btn btn-sm btn-dark rounded-circle p-1 reaction-btn" data-emoji="❤️" style="width: 32px; height: 32px; font-size: 1.1rem; line-height: 1;">❤️</button>
    <button class="btn btn-sm btn-dark rounded-circle p-1 reaction-btn" data-emoji="😆" style="width: 32px; height: 32px; font-size: 1.1rem; line-height: 1;">😆</button>
    <button class="btn btn-sm btn-dark rounded-circle p-1 reaction-btn" data-emoji="😮" style="width: 32px; height: 32px; font-size: 1.1rem; line-height: 1;">😮</button>
    <button class="btn btn-sm btn-dark rounded-circle p-1 reaction-btn" data-emoji="😢" style="width: 32px; height: 32px; font-size: 1.1rem; line-height: 1;">😢</button>
    <button class="btn btn-sm btn-dark rounded-circle p-1 reaction-btn" data-emoji="😡" style="width: 32px; height: 32px; font-size: 1.1rem; line-height: 1;">😡</button>
    <button class="btn btn-sm btn-dark rounded-circle p-1 reaction-btn" data-emoji="👍" style="width: 32px; height: 32px; font-size: 1.1rem; line-height: 1;">👍</button>
    
    <div class="dropup ms-1">
      <button class="btn btn-sm btn-secondary rounded-circle p-1 text-white" ref="moreBtn" style="width: 32px; height: 32px; font-size: 1.1rem; line-height: 1;" data-bs-toggle="dropdown" aria-expanded="false" data-bs-auto-close="outside">+</button>
      <div class="dropdown-menu p-0 bg-dark border border-secondary shadow" ref="emojiPopover" style="z-index: 1050;">
        <!-- Emoji picker will be injected here -->
      </div>
    </div>
    
    <button class="btn btn-sm btn-info rounded-circle p-1 text-white ms-1 d-flex align-items-center justify-content-center" ref="playBtn" style="width: 32px; height: 32px; line-height: 1;">
      <i class="bi bi-play-fill" style="font-size: 1.2rem; margin-left: 2px;"></i>
    </button>

    <button class="btn btn-sm btn-info rounded-circle p-1 text-white ms-1 d-flex align-items-center justify-content-center" ref="transcribeBtn" style="width: 32px; height: 32px; line-height: 1;">
      <i class="bi bi-soundwave" style="font-size: 1.2rem;"></i>
    </button>
  </nav>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'
export default defineComponent({
  client: {
    imports: [
      {
        specifier: 'https://cdn.jsdelivr.net/npm/emoji-picker-element@^1.27/database.js'
      },
      {
        specifier: 'https://cdn.jsdelivr.net/npm/emoji-picker-element@^1.27/picker.js'
      }
    ],
    script: ({
      helpers,
      values,
      signal
    }) => {
      const {
        refs,
        setState
      } = helpers
      const container = refs('container')
      const emojiPopover = refs('emojiPopover')
      const moreBtn = refs('moreBtn')
      const playButton = refs('playBtn')
      const transcribeBtn = refs('transcribeBtn')

      let pickerInitialized = false

      // Extract properties passed from parent
      const eventId = values['event-id']
      const roomId = values['room-id']

      // Play button handler
      playButton.addEventListener('click', () => {
        if (eventId && roomId) {
          setState('triggerTtsPlayRequested', {
            eventId,
            roomId,
            ts: Date.now()
          })
        }
      }, { signal })

      // Transcribe button handler
      transcribeBtn.addEventListener('click', () => {
        if (eventId && roomId) {
          setState('triggerTranscribeAudio', {
            eventId,
            roomId,
            ts: Date.now()
          })
        }
      }, { signal })

      const sendReaction = emoji => {
        if (!eventId || !roomId) {
          console.error('atoll-message-actions: Missing event-id or room-id', {
            eventId,
            roomId
          })
          return
        }
        setState('triggerSendReaction', {
          roomId,
          eventId,
          reaction: emoji,
          ts: Date.now()
        })

        // Close dropdown if open
        const dropdownInstance = bootstrap.Dropdown.getInstance(moreBtn)
        if (dropdownInstance) {
          dropdownInstance.hide()
        }
      }

      // Handle predefined emoji clicks
      const buttons = container.querySelectorAll('.reaction-btn')
      buttons.forEach(button => {
        button.addEventListener('click', event => {
          const emoji = event.currentTarget.dataset.emoji
          if (emoji) {
            sendReaction(emoji)
          }
        }, { signal })
      })

      // Initialize emoji picker on first open
      moreBtn.addEventListener('show.bs.dropdown', () => {
        if (!pickerInitialized) {
          pickerInitialized = true
          const picker = document.createElement('emoji-picker')
          // Apply dark theme styling to match the app
          picker.classList.add('dark')

          // Set some styling variables if needed
          picker.style.setProperty('--background', '#212529')
          picker.style.setProperty('--border-color', '#495057')
          picker.addEventListener('emoji-click', event => {
            sendReaction(event.detail.unicode)
          }, { signal })
          emojiPopover.appendChild(picker)
        }
      }, { signal })
    }
  }
})
</script>
