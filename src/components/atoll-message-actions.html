<template id="atoll-message-actions">
  <div class="message-actions bg-dark border border-secondary rounded-pill shadow-sm d-flex align-items-center px-2 py-1 gap-1" style="display: none !important;" ref="container">
    <button class="btn btn-sm btn-dark rounded-circle p-1 reaction-btn" data-emoji="❤️" style="width: 32px; height: 32px; font-size: 1.1rem; line-height: 1;">❤️</button>
    <button class="btn btn-sm btn-dark rounded-circle p-1 reaction-btn" data-emoji="😆" style="width: 32px; height: 32px; font-size: 1.1rem; line-height: 1;">😆</button>
    <button class="btn btn-sm btn-dark rounded-circle p-1 reaction-btn" data-emoji="😮" style="width: 32px; height: 32px; font-size: 1.1rem; line-height: 1;">😮</button>
    <button class="btn btn-sm btn-dark rounded-circle p-1 reaction-btn" data-emoji="😢" style="width: 32px; height: 32px; font-size: 1.1rem; line-height: 1;">😢</button>
    <button class="btn btn-sm btn-dark rounded-circle p-1 reaction-btn" data-emoji="😡" style="width: 32px; height: 32px; font-size: 1.1rem; line-height: 1;">😡</button>
    <button class="btn btn-sm btn-dark rounded-circle p-1 reaction-btn" data-emoji="👍" style="width: 32px; height: 32px; font-size: 1.1rem; line-height: 1;">👍</button>
    <button class="btn btn-sm btn-secondary rounded-circle p-1 text-white ms-1" ref="moreBtn" style="width: 32px; height: 32px; font-size: 1.1rem; line-height: 1;" popovertarget="{{ ref_emojiPopover }}">+</button>
    
    <button class="btn btn-sm btn-info rounded-circle p-1 text-white ms-1 d-flex align-items-center justify-content-center" ref="playBtn" style="width: 32px; height: 32px; line-height: 1;">
      <i class="bi bi-play-fill" style="font-size: 1.2rem; margin-left: 2px;"></i>
    </button>

    <div popover id="{{ ref_emojiPopover }}" ref="emojiPopover" class="bg-dark border border-secondary rounded-3 shadow p-0 m-0" style="z-index: 1050; anchor-name: --anchor-{{ ref_emojiPopover }}; position-anchor: --anchor-{{ ref_emojiPopover }}; position-area: top;">
      <!-- Emoji picker will be injected here -->
    </div>
  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'
export default defineComponent({
  client: {
    imports: [{
      specifier: 'https://cdn.jsdelivr.net/npm/emoji-picker-element@^1.27/database.js'
    }, {
      specifier: 'https://cdn.jsdelivr.net/npm/emoji-picker-element@^1.27/picker.js'
    }],
    script: ({
      helpers,
      values
    }) => {
      const {
        refs: references,
        emit,
        events
      } = helpers
      const container = references('container')
      const emojiPopover = references('emojiPopover')
      const moreBtn = references('moreBtn')
      const playButton = references('playBtn')
      let pickerInitialized = false

      // Extract properties passed from parent
      const eventId = values['event-id']
      const roomId = values['room-id']

      // Play button handler
      if (playButton) {
        playButton.addEventListener('click', () => {
          if (eventId && roomId) {
            emit(events('chat:tts-play-requested'), {
              eventId,
              roomId
            })
          }
        })
      }
      const sendReaction = emoji => {
        if (!eventId || !roomId) {
          console.error('atoll-message-actions: Missing event-id or room-id', {
            eventId,
            roomId
          })
          return
        }
        emit(events('chat:send-reaction'), {
          roomId,
          eventId,
          reaction: emoji
        })

        // Close popover if open
        if (emojiPopover.matches(':popover-open')) {
          emojiPopover.hidePopover()
        }
      }

      // Handle predefined emoji clicks
      const buttons = container.querySelectorAll('.reaction-btn')
      buttons.forEach(button => {
        button.addEventListener('click', event => {
          const emoji = event.currentTarget.dataset.emoji
          if (emoji) {
            sendReaction(emoji)
          }
        })
      })

      // Initialize emoji picker on first open
      emojiPopover.addEventListener('beforetoggle', event => {
        if (event.newState === 'open' && !pickerInitialized) {
          pickerInitialized = true
          const picker = document.createElement('emoji-picker')
          // Apply dark theme styling to match the app
          picker.classList.add('dark')

          // Set some styling variables if needed
          picker.style.setProperty('--background', '#212529')
          picker.style.setProperty('--border-color', '#495057')
          picker.addEventListener('emoji-click', event => {
            sendReaction(event.detail.unicode)
          })
          emojiPopover.appendChild(picker)
        }
      })
    }
  }
})
</script>
