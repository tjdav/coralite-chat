<template id="atoll-signup">
  <div class="d-flex align-items-center justify-content-center vh-100">
    <div class="card p-4" style="width: 400px; max-width: 100%;">
      <h2 class="text-center mb-4">Sign Up to Matrix</h2>
      <form ref="form">
        <div class="form-floating mb-3">
          <input type="url" class="form-control" ref="homeserver" id="{{ ref_homeserver }}" placeholder="Homeserver URL" required>
          <label for="{{ ref_homeserver }}">Homeserver URL</label>
        </div>
        <div class="form-floating mb-3">
          <input type="text" class="form-control" ref="username" id="{{ ref_username }}" placeholder="Username" required>
          <label for="{{ ref_username }}">Username</label>
        </div>
        <div class="form-floating mb-3">
          <input type="password" class="form-control" ref="password" id="{{ ref_password }}" placeholder="Password" required>
          <label for="{{ ref_password }}">Password</label>
        </div>
        <div class="form-floating mb-3">
          <input type="password" class="form-control" ref="confirmPassword" id="{{ ref_confirmPassword }}" placeholder="Confirm Password" required>
          <label for="{{ ref_confirmPassword }}">Confirm Password</label>
        </div>
        <button type="submit" class="btn btn-primary w-100" ref="submitButton">Sign Up</button>
      </form>
      <div class="alert alert-danger mt-3 d-transition-none" role="alert" ref="errorAlert"></div>
      
      <div class="text-center mt-3">
        <a href="#" class="text-muted text-decoration-none" ref="loginLink">Already have an account? Log in.</a>
      </div>
    </div>
  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'
export default defineComponent({
  client: {
    script: ({
      helpers,
      context
    }) => {
      const {
        refs: references,
        registerUser,
        sync,
        emit,
        events
      } = helpers
      const form = references('form')
      const homeserverInput = references('homeserver')
      const usernameInput = references('username')
      const passwordInput = references('password')
      const confirmPasswordInput = references('confirmPassword')
      const errorAlert = references('errorAlert')
      const submitButton = references('submitButton')
      const loginLink = references('loginLink')
      homeserverInput.value = (helpers.getDefaultHomeserverUrl && helpers.getDefaultHomeserverUrl()) || 'https://matrix.org'
      loginLink.addEventListener('click', event => {
        event.preventDefault()
        emit(events('auth:show-login'))
      })
      form.addEventListener('submit', async event => {
        event.preventDefault()
        const baseUrl = homeserverInput.value
        const username = usernameInput.value
        const password = passwordInput.value
        const confirmPassword = confirmPasswordInput.value
        const urlParams = new URLSearchParams(window.location.search)
        const token = urlParams.get('token')
        errorAlert.classList.remove('d-transition-show')
        errorAlert.classList.add('d-transition-none')
        if (password !== confirmPassword) {
          errorAlert.textContent = 'Passwords do not match.'
          errorAlert.classList.remove('d-transition-none')
          errorAlert.classList.add('d-transition-show')
          return
        }
        submitButton.disabled = true
        submitButton.textContent = 'Signing up...'
        try {
          await registerUser({
            baseUrl,
            username,
            password,
            token
          })
          submitButton.textContent = 'Syncing...'
          await sync()
          emit(events('app:logged-in'))
        } catch (error) {
          console.error('Sign up error', error)
          errorAlert.textContent = 'Registration failed. Please try again. ' + (error.message || '')
          errorAlert.classList.remove('d-transition-none')
          errorAlert.classList.add('d-transition-show')
          submitButton.disabled = false
          submitButton.textContent = 'Sign Up'
        }
      })
    }
  }
})
</script>
