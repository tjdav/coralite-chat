<template id="atoll-signup">
  <div class="d-flex align-items-center justify-content-center vh-100">
    <div class="card p-4" style="width: 400px; max-width: 100%;">
      <h2 class="text-center mb-4">Sign Up</h2>
      <form ref="form">
        <div class="form-floating mb-3">
          <input type="text" class="form-control" ref="username" id="{{ ref_username }}" placeholder="Username" required>
          <label for="{{ ref_username }}">Username</label>
        </div>
        <div class="form-floating mb-3">
          <input type="password" class="form-control" ref="password" id="{{ ref_password }}" placeholder="Password" required>
          <label for="{{ ref_password }}">Password</label>
        </div>
        <div class="form-floating mb-3">
          <input type="password" class="form-control" ref="confirmPassword" id="{{ ref_confirmPassword }}" placeholder="Confirm Password" required>
          <label for="{{ ref_confirmPassword }}">Confirm Password</label>
        </div>
        <button type="submit" class="btn btn-primary w-100" ref="submitButton">Sign Up</button>
      </form>
      <div class="alert alert-danger mt-3 d-transition-none" role="alert" ref="errorAlert"></div>
      
      <div class="text-center mt-3">
        <a href="#" class="text-muted text-decoration-none" ref="loginLink">Already have an account? Log in.</a>
      </div>
    </div>
    
    <!-- Backup Code Modal Container -->
    <div ref="backupCodeModalContainer" class="d-none position-fixed top-0 start-0 w-100 h-100 bg-dark bg-opacity-75 z-3 align-items-center justify-content-center">
      <div class="card p-4 bg-dark text-white border-secondary" style="width: 500px; max-width: 90%;">
        <h3 class="text-danger mb-3"><i class="bi bi-exclamation-triangle-fill me-2"></i> Save Your Backup Code</h3>
        <p>This is the <strong>only time</strong> you will see this code. If you lose access to your device or forget your PIN, you will need this to recover your encrypted messages.</p>
        <div class="bg-black p-3 rounded mb-3 text-center fs-5 text-monospace user-select-all" ref="backupCodeDisplay"></div>
        <div class="form-check mb-4">
          <input class="form-check-input" type="checkbox" id="backupSavedCheck" ref="backupSavedCheck">
          <label class="form-check-label" for="backupSavedCheck">
            I have safely stored this backup code.
          </label>
        </div>
        <button class="btn btn-primary w-100" ref="continueButton" disabled>Continue</button>
      </div>
    </div>
  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'
export default defineComponent({
  client: {
    script: ({
      helpers,
      context
    }) => {
      const {
        refs: references,
        registerUser,
        sync,
        setState
      } = helpers
      const form = references('form')
      const usernameInput = references('username')
      const passwordInput = references('password')
      const confirmPasswordInput = references('confirmPassword')
      const errorAlert = references('errorAlert')
      const submitButton = references('submitButton')
      const loginLink = references('loginLink')
      const backupCodeModalContainer = references('backupCodeModalContainer')
      const backupCodeDisplay = references('backupCodeDisplay')
      const backupSavedCheck = references('backupSavedCheck')
      const continueButton = references('continueButton')

      loginLink.addEventListener('click', event => {
        event.preventDefault()
        setState('triggerShowLogin', { ts: Date.now() })
      })
      form.addEventListener('submit', async event => {
        event.preventDefault()
        const username = usernameInput.value
        const password = passwordInput.value
        const confirmPassword = confirmPasswordInput.value
        const urlParams = new URLSearchParams(window.location.search)
        const token = urlParams.get('token')
        errorAlert.classList.remove('d-transition-show')
        errorAlert.classList.add('d-transition-none')
        if (password !== confirmPassword) {
          errorAlert.textContent = 'Passwords do not match.'
          errorAlert.classList.remove('d-transition-none')
          errorAlert.classList.add('d-transition-show')
          return
        }
        submitButton.disabled = true
        submitButton.textContent = 'Signing up...'
        try {

          const result = await helpers.crypto().registerWithPasskey({
            username,
            password,
            displayName: username,
            pin: password
          })

          if (result.success && result.backupCode) {
            backupCodeDisplay.textContent = result.backupCode
            backupCodeModalContainer.classList.remove('d-none')
            backupCodeModalContainer.classList.add('d-flex')
          } else {

            await sync()
            setState('isLoggedIn', true)
          }

        } catch (error) {
          console.error('Sign up error', error)
          errorAlert.textContent = 'Registration failed. Please try again. ' + (error.message || '')
          errorAlert.classList.remove('d-transition-none')
          errorAlert.classList.add('d-transition-show')
          submitButton.disabled = false
          submitButton.textContent = 'Sign Up'
        }
      })

      backupSavedCheck.addEventListener('change', (event) => {
        continueButton.disabled = !event.target.checked
      })

      continueButton.addEventListener('click', async () => {
        backupCodeModalContainer.classList.remove('d-flex')
        backupCodeModalContainer.classList.add('d-none')
        submitButton.textContent = 'Syncing...'
        await sync()
        setState('isLoggedIn', true)
      })
    }
  }
})
</script>
