<template id="atoll-audio-controls">
  <!-- Center: Controls -->
  <div class="d-flex justify-content-center align-items-center gap-3">
    <button class="btn btn-link text-white p-0 fs-5" ref="shuffleBtn" title="Shuffle"><i class="bi bi-shuffle" ref="shuffleIcon"></i></button>
    <button class="btn btn-link text-white p-0 fs-4" ref="prevBtn" title="Previous"><i class="bi bi-skip-start-fill"></i></button>
    <button class="btn btn-link text-white p-0 fs-2" ref="playPauseBtn" title="Play/Pause">
      <i class="bi bi-play-circle-fill" ref="playPauseIcon"></i>
    </button>
    <button class="btn btn-link text-white p-0 fs-4" ref="nextBtn" title="Next"><i class="bi bi-skip-end-fill"></i></button>
    <button class="btn btn-link text-white p-0 fs-5" ref="repeatBtn" title="Repeat"><i class="bi bi-repeat" ref="repeatIcon"></i></button>
  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'
export default defineComponent({
  client: {
    script: ({
      helpers
    }) => {
      const {
        refs: references,
        on,
        emit,
        events
      } = helpers
      const shuffleButton = references('shuffleBtn')
      const shuffleIcon = references('shuffleIcon')
      const previousButton = references('prevBtn')
      const playPauseBtn = references('playPauseBtn')
      const playPauseIcon = references('playPauseIcon')
      const nextButton = references('nextBtn')
      const repeatButton = references('repeatBtn')
      const repeatIcon = references('repeatIcon')

      // Listen for state changes from the parent

      on(events('player:play-state-change'), ({
        isPlaying
      }) => {
        if (isPlaying) {
          playPauseIcon.classList.remove('bi-play-circle-fill')
          playPauseIcon.classList.add('bi-pause-circle-fill')
        } else {
          playPauseIcon.classList.remove('bi-pause-circle-fill')
          playPauseIcon.classList.add('bi-play-circle-fill')
        }
      })
      on(events('player:shuffle-change'), ({
        isShuffle
      }) => {
        if (isShuffle) {
          shuffleIcon.classList.add('text-primary')
        } else {
          shuffleIcon.classList.remove('text-primary')
        }
      })
      on(events('player:repeat-change'), ({
        repeatMode
      }) => {
        if (repeatMode === 'all') {
          repeatIcon.classList.remove('bi-repeat', 'bi-repeat-1')
          repeatIcon.classList.add('bi-repeat', 'text-primary')
        } else if (repeatMode === 'one') {
          repeatIcon.classList.remove('bi-repeat', 'bi-repeat-1')
          repeatIcon.classList.add('bi-repeat-1', 'text-primary')
        } else {
          repeatIcon.classList.remove('bi-repeat-1', 'text-primary')
          repeatIcon.classList.add('bi-repeat')
        }
      })

      // Emit events when buttons are clicked
      playPauseBtn.addEventListener('click', () => {
        emit(events('player:toggle-play'))
      })
      previousButton.addEventListener('click', () => {
        emit(events('player:previous'))
      })
      nextButton.addEventListener('click', () => {
        emit(events('player:next'))
      })
      shuffleButton.addEventListener('click', () => {
        emit(events('player:toggle-shuffle'))
      })
      repeatButton.addEventListener('click', () => {
        emit(events('player:toggle-repeat'))
      })
    }
  }
})
</script>
