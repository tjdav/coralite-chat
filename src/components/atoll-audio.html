<template id="atoll-audio">
  <div class="d-flex flex-column h-100 position-relative">
    <div class="list-group list-group-flush flex-grow-1 overflow-auto mb-5" ref="trackList">
      <!-- Tracks rendered here -->
    </div>
    
    <div class="d-transition-none text-center p-5 text-muted" ref="emptyState">
      <i class="bi bi-music-note-list" style="font-size: 3rem;"></i>
      <h5 class="mt-3">No Audio Found</h5>
      <p>Any music or voice notes you receive will appear here.</p>
    </div>
  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'
export default defineComponent({
  client: {
    script: ({
      helpers
    }) => {
      const {
        refs: references,
        emit,
        events,
        getAudioFiles
      } = helpers
      const trackList = references('trackList')
      const emptyState = references('emptyState')
      let currentActiveItem = null

      // Format file size
      const formatBytes = (bytes, decimals = 2) => {
        if (!+bytes) {
          return '0 Bytes'
        }
        const k = 1024
        const dm = decimals < 0 ? 0 : decimals
        const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB', 'PB', 'EB', 'ZB', 'YB']
        const i = Math.floor(Math.log(bytes) / Math.log(k))
        return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`
      }
      const initialize = async () => {
        const files = await getAudioFiles()
        if (files.length === 0) {
          emptyState.classList.remove('d-transition-none')
          emptyState.classList.add('d-transition-show')
          return
        }
        emptyState.classList.remove('d-transition-show')
        emptyState.classList.add('d-transition-none')
        files.forEach(file => {
          const listItem = document.createElement('button')
          listItem.className = 'list-group-item list-group-item-action d-flex justify-content-between align-items-center p-3'

          // Create main container
          const mainDiv = document.createElement('div')
          mainDiv.className = 'd-flex align-items-center overflow-hidden'

          // Icon
          const iconDiv = document.createElement('div')
          iconDiv.className = 'me-3 text-secondary'
          // Static safe HTML
          iconDiv.innerHTML = '<i class="bi bi-music-note-beamed fs-4"></i>'

          // Text details
          const textDiv = document.createElement('div')
          textDiv.className = 'text-truncate text-start'
          const titleDiv = document.createElement('div')
          titleDiv.className = 'fw-bold text-truncate'
          titleDiv.style.maxWidth = '250px'
          // Safe against XSS
          titleDiv.textContent = file.filename || 'Unknown File'
          const sizeSmall = document.createElement('small')
          sizeSmall.className = 'text-muted'
          // Safe against XSS
          sizeSmall.textContent = formatBytes(file.size)
          textDiv.appendChild(titleDiv)
          textDiv.appendChild(sizeSmall)
          mainDiv.appendChild(iconDiv)
          mainDiv.appendChild(textDiv)

          // Date badge
          const dateDiv = document.createElement('div')
          dateDiv.className = 'ms-3 flex-shrink-0'
          const badgeSpan = document.createElement('span')
          badgeSpan.className = 'badge bg-secondary rounded-pill'
          // Safe against XSS
          badgeSpan.textContent = new Date(file.timestamp).toLocaleDateString()
          dateDiv.appendChild(badgeSpan)

          // Assemble
          listItem.appendChild(mainDiv)
          listItem.appendChild(dateDiv)
          listItem.addEventListener('click', () => {
            // Update active state
            if (currentActiveItem) {
              currentActiveItem.classList.remove('active')
            }
            listItem.classList.add('active')
            currentActiveItem = listItem
            const index = files.findIndex(f => f.id === file.id)
            emit(events('audio:play'), {
              file,
              playlist: files,
              index
            })
          })
          trackList.appendChild(listItem)
        })
      }
      initialize()
    }
  }
})
</script>
