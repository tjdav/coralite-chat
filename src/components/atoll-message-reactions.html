<template id="atoll-message-reactions">
  <div class="message-reactions d-flex flex-wrap gap-1 mt-1" ref="container">
    <slot></slot>
  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'
export default defineComponent({
  client: {
    components: ['atoll-message-reaction'],
    script: ({
      helpers,
      values,
      signal
    }) => {
      const {
        refs: references,
        subscribe
      } = helpers
      const container = references('container')

      const eventId = values['event-id']
      const roomId = values['room-id']

      const renderReactions = (reactionsData) => {
        container.replaceChildren()
        if (!reactionsData || Object.keys(reactionsData).length === 0) {
          return
        }
        Object.entries(reactionsData).forEach(([emoji, data]) => {
          const reactionElement = document.createElement('atoll-message-reaction')
          reactionElement.setAttribute('emoji', emoji)
          reactionElement.setAttribute('count', data.count)
          reactionElement.setAttribute('has-reacted', data.hasReacted)
          reactionElement.setAttribute('event-id', eventId)
          reactionElement.setAttribute('room-id', roomId)
          container.appendChild(reactionElement)
        })
      }

      // Listen for new incoming reactions to this message
      subscribe('triggerReactionReceived', (payload) => {
        if (!payload) {
          return
        }
        if (payload.eventId === eventId) {
          renderReactions(payload.reactions)
        }
      })
    }
  }
})
</script>
