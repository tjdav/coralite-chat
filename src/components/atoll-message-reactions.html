<template id="atoll-message-reactions">
  <div class="message-reactions d-flex flex-wrap gap-1 mt-1" ref="container">
    <!-- Reactions will be injected here -->
  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'
export default defineComponent({
  client: {
    script: ({
      helpers,
      values,
      signal
    }) => {
      const {
        refs: references,
        subscribe,
        setState,
        getCurrentUserId
      } = helpers
      const container = references('container')

      // Reactions object structure: { emoji: { count, hasReacted } }
      let currentReactions = values.reactions || {}
      let currentUserId = null
      const eventId = values['event-id']
      const roomId = values['room-id']
      const renderReactions = () => {
        container.innerHTML = ''
        if (!currentReactions || Object.keys(currentReactions).length === 0) {
          return
        }
        Object.entries(currentReactions).forEach(([emoji, data]) => {
          const button = document.createElement('button')
          button.className = `btn btn-sm d-flex align-items-center gap-1 rounded-pill px-2 py-0 border ${data.hasReacted ? 'btn-secondary border-secondary text-white' : 'btn-dark border-secondary'}`
          button.style.fontSize = '0.8rem'
          const emojiSpan = document.createElement('span')
          emojiSpan.textContent = emoji
          const countSpan = document.createElement('span')
          countSpan.textContent = data.count
          button.appendChild(emojiSpan)
          button.appendChild(countSpan)
          button.addEventListener('click', () => {
            if (data.hasReacted) {
              setState('triggerRemoveReaction', {
                roomId,
                eventId,
                reaction: emoji,
                ts: Date.now()
              })
            } else {
              setState('triggerSendReaction', {
                roomId,
                eventId,
                reaction: emoji,
                ts: Date.now()
              })
            }
          }, { signal })
          container.appendChild(button)
        })
      }

      // Initialize user ID to handle highlighting own reactions
      const initialize = async () => {
        currentUserId = await getCurrentUserId()
        renderReactions()
      }
      initialize()

      // Listen for new incoming reactions to this message
      subscribe('triggerReactionReceived', (payload) => {
        if (!payload) {
          return
        }
        if (payload.eventId === eventId) {
          currentReactions = payload.reactions
          renderReactions()
        }
      })
    }
  }
})
</script>
