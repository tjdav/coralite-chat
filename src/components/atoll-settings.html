<template id="atoll-settings">
  <div class="d-flex w-100 h-100 bg-body">
    <!-- Settings Navigation -->
    <div class="w-250px border-end border-secondary p-3 h-100 overflow-auto bg-dark">
      <h5 class="mb-4 text-white"><i class="bi bi-gear me-2"></i> Settings</h5>
      <ul class="nav nav-pills flex-column" ref="settingsNavList">
        <li class="nav-item mb-2">
          <a href="#" data-setting="general" class="nav-link active rounded-3 d-flex align-items-center" aria-current="page">
            <i class="bi bi-sliders me-3 fs-5"></i>
            General
          </a>
        </li>
        <li class="nav-item mb-2">
          <a href="#" data-setting="secret-storage" class="nav-link text-white rounded-3 d-flex align-items-center">
            <i class="bi bi-shield-lock me-3 fs-5"></i>
            Password & Security
          </a>
        </li>
      </ul>
    </div>

    <!-- Settings Content Area -->
    <div class="flex-grow-1 p-4 h-100 overflow-auto text-white">
      
      <!-- General Settings -->
      <div ref="generalSettings" class="settings-section">
        <h2 class="mb-4 border-bottom border-secondary pb-2">General Settings</h2>
        
        <div class="card bg-dark text-white border-secondary mb-4">
          <div class="card-body">
            <h5 class="card-title"><i class="bi bi-chat-dots text-primary me-2"></i> Chat Settings</h5>
            
            <div class="form-check form-switch mt-3">
              <input class="form-check-input" type="checkbox" role="switch" id="typingNotificationsSwitch" ref="typingNotificationsSwitch" checked>
              <label class="form-check-label" for="typingNotificationsSwitch">
                Send typing notifications
                <small class="d-block text-muted">Let others know when you are typing a message. You will still be able to see when others are typing even if this is disabled.</small>
              </label>
            </div>
          </div>
        </div>
      </div>

      <!-- Password & Security Settings -->
      <div ref="secretStorageSettings" class="settings-section d-none">
        <h2 class="mb-4 border-bottom border-secondary pb-2">Password & Security</h2>
        <div class="card bg-dark text-white border-secondary mb-4">
          <div class="card-body">
            <h5 class="card-title text-danger"><i class="bi bi-shield-lock me-2"></i> Revoke Devices</h5>
            <p class="card-text text-muted mb-4">
              Revoking devices will permanently segment your chat history. You will lose access to previous messages encrypted with your old key.
            </p>
            <button class="btn btn-danger" ref="revokeDevicesBtn">
              <i class="bi bi-exclamation-triangle me-2"></i> Revoke Devices
            </button>
          </div>
        </div>
      </div>
      
    </div>
  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'

export default defineComponent({
  client: {
    script: ({
      helpers
    }) => {
      const {
        refs: references,
        getClient,
        setState
      } = helpers

      const settingsNavList = references('settingsNavList')
      const links = settingsNavList.querySelectorAll('.nav-link')

      const generalSettings = references('generalSettings')
      const secretStorageSettings = references('secretStorageSettings')
      const revokeDevicesBtn = references('revokeDevicesBtn')
      const typingNotificationsSwitch = references('typingNotificationsSwitch')

      const { getTypingNotificationsPreference, setTypingNotificationsPreference } = helpers

      // Initialize switch
      const initSettings = async () => {
        try {
          const typingPref = await getTypingNotificationsPreference()
          typingNotificationsSwitch.checked = typingPref
        } catch (error) {
          console.error('Failed to get preferences:', error)
        }
      }
      initSettings()

      typingNotificationsSwitch.addEventListener('change', async (event) => {
        try {
          await setTypingNotificationsPreference(event.target.checked)
        } catch (error) {
          console.error('Failed to set typing notification preference:', error)
        }
      })

      const sections = {
        general: generalSettings,
        'secret-storage': secretStorageSettings
      }

      const updateActiveSection = settingName => {
        // Update Nav
        links.forEach(link => {
          if (link.dataset.setting === settingName) {
            link.classList.add('active')
            link.classList.remove('text-white')
            link.setAttribute('aria-current', 'page')
          } else {
            link.classList.remove('active')
            link.classList.add('text-white')
            link.removeAttribute('aria-current')
          }
        })

        // Update Content
        Object.keys(sections).forEach(key => {
          if (key === settingName) {
            sections[key].classList.remove('d-none')
          } else {
            sections[key].classList.add('d-none')
          }
        })
      }

      links.forEach(link => {
        link.addEventListener('click', event => {
          event.preventDefault()
          const settingName = link.dataset.setting
          updateActiveSection(settingName)
        })
      })

      revokeDevicesBtn.addEventListener('click', async () => {
        if (confirm('Are you sure you want to revoke devices? This will break encryption for older messages.')) {
          const pin = prompt('Please enter your PIN/Password to confirm revocation and re-encrypt your vault.')
          if (!pin) {
            return
          }

          try {
            const result = await helpers.crypto().revokeDevices(pin)
            if (result.success) {
              alert('Devices revoked. Your new Backup Code is: ' + result.newBackupCode + '\n\nPlease save it safely. You will now be logged out.')
              helpers.setState('isLoggedIn', false)
            }
          } catch (error) {
            console.error(error)
            alert('Failed to revoke devices: ' + error.message)
          }
        }
      })
    }
  }
})
</script>
