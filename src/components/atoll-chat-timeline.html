<template id="atoll-chat-timeline">
  <div class="d-flex flex-column p-4 overflow-auto h-100" ref="messagesContainer">
    <!-- Messages rendered here -->
  </div>
</template>

<script type="module" client>
  import { defineComponent } from 'coralite'

  export default defineComponent({
    client: {
      components: ['atoll-message-bubble', 'atoll-torrent-bubble'],
      script: ({ helpers }) => {
        const { refs, on, events, getCurrentUserId, getRoomMessages, onRoomMessage } = helpers
        const messagesContainer = refs('messagesContainer')
        let currentCleanup = null

        const scrollToBottom = (smooth = true) => {
          messagesContainer.scrollTo({
            top: messagesContainer.scrollHeight,
            behavior: smooth ? 'smooth' : 'auto'
          })
        }

        const isNearBottom = () => {
          return messagesContainer.scrollHeight - messagesContainer.scrollTop - messagesContainer.clientHeight < 100
        }

        let currentRoomId = null
        let pendingScrollEventId = null

        const executePendingScroll = () => {
          if (!pendingScrollEventId) return

          const msgElement = messagesContainer.querySelector(`#msg-${pendingScrollEventId.replace(/[^a-zA-Z0-9_-]/g, '\\$&')}`)
          if (msgElement) {
            msgElement.scrollIntoView({ behavior: 'smooth', block: 'center' })
            const bubble = msgElement.querySelector('atoll-message-bubble')
            if (bubble) {
               bubble.style.transition = 'background-color 0.5s'
               const originalBg = bubble.style.backgroundColor
               bubble.style.backgroundColor = 'rgba(13, 110, 253, 0.2)'
               setTimeout(() => {
                 bubble.style.backgroundColor = originalBg
               }, 2000)
            }
            pendingScrollEventId = null
          }
        }

        const renderMessage = (message, isCurrentUser) => {
          const time = new Date(message.date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })

          const div = document.createElement('div')
          div.id = `msg-${message.id}` // Add ID for scrolling
          
          if (message.isEncrypted && !message.body) {
             const bubble = document.createElement('atoll-message-bubble')
             bubble.setAttribute('time', time)
             bubble.setAttribute('current-user', isCurrentUser)
             bubble.values = { body: '*Encrypted message*' }
             div.appendChild(bubble)
          } else if (message.msgtype === 'm.atoll.webtorrent' && message.info) {
             const torrentBubble = document.createElement('atoll-torrent-bubble')
             // We pass data via the context.value API mechanism
             torrentBubble.values = {
               info: message.info,
               'event-id': message.id,
               'sender-id': message.sender,
               'room-id': currentRoomId
             }

             // Wrap it in a message bubble to get the correct alignment and time
             const bubble = document.createElement('atoll-message-bubble')
             bubble.setAttribute('time', time)
             bubble.setAttribute('current-user', isCurrentUser)
             bubble.values = { 
               'event-id': message.id,
               'room-id': currentRoomId,
               reactions: message.reactions || {}
             }
             bubble.appendChild(torrentBubble)

             div.appendChild(bubble)
          } else {
             const bubble = document.createElement('atoll-message-bubble')
             bubble.setAttribute('time', time)
             bubble.setAttribute('current-user', isCurrentUser)
             // Use property so declarative shadow DOM isn't bypassed, or we can use attribute if we escape it. 
             // Safe way to pass message text without innerHTML execution. 
             bubble.values = { 
               body: message.body,
               'event-id': message.id,
               'room-id': currentRoomId,
               reactions: message.reactions || {}
             }
             // Don't set textContent immediately, let it render
             
             div.appendChild(bubble)
          }

          return div
        }

        on(events('chat:room-ready'), async ({ roomId }) => {
          if (currentCleanup) {
            currentCleanup()
          }

          currentRoomId = roomId

          messagesContainer.innerHTML = ''

          const currentUserId = await getCurrentUserId()

          // Fetch initial history
          const history = await getRoomMessages(roomId)

          history.forEach(msg => {
            const isCurrentUser = msg.sender === currentUserId
            const msgEl = renderMessage(msg, isCurrentUser)
            messagesContainer.appendChild(msgEl)
          })

          if (pendingScrollEventId) {
             // If we have a pending scroll, execute it after a brief tick for render
             setTimeout(executePendingScroll, 50)
          } else {
             // Scroll to bottom immediately
             setTimeout(() => scrollToBottom(false), 0)
          }

          // Listen for new messages
          currentCleanup = await onRoomMessage(roomId, (newMsg) => {
            const isCurrentUser = newMsg.sender === currentUserId
            const nearBottom = isNearBottom()

            const msgEl = renderMessage(newMsg, isCurrentUser)
            messagesContainer.appendChild(msgEl)

            // Auto-scroll logic: only if near bottom or if it's our own message
            if (nearBottom || isCurrentUser) {
              setTimeout(() => scrollToBottom(true), 0)
            }
          })
        })

        // Listen for requests to scroll to a specific message
        on(events('chat:scroll-to-message'), ({ eventId }) => {
          pendingScrollEventId = eventId
          // Try executing immediately in case the room is already loaded and we're just jumping
          executePendingScroll()
        })
      }
    }
  })
</script>
