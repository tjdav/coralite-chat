<template id="atoll-chat-timeline">
  <div class="d-flex flex-column h-100 position-relative">
    <div class="d-flex flex-column p-4 overflow-auto flex-grow-1" ref="messagesContainer">
      <!-- Messages rendered here -->
    </div>
    <div class="position-absolute bottom-0 start-50 translate-middle-x mb-2" style="z-index: 10;">
      <atoll-typing-indicator></atoll-typing-indicator>
    </div>
  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'
export default defineComponent({
  client: {
    components: ['atoll-message-bubble', 'atoll-torrent-bubble', 'atoll-message-reactions', 'atoll-message-reaction', 'atoll-system-message', 'atoll-typing-indicator'],
    script: ({
      helpers,
      signal
    }) => {
      const {
        refs,
        subscribe,
        getCurrentUserId,
        getRoomMessages,
        onRoomMessage
      } = helpers
      const messagesContainer = refs('messagesContainer')
      let currentCleanup = null
      const scrollToBottom = (smooth = true) => {
        messagesContainer.scrollTo({
          top: messagesContainer.scrollHeight,
          behavior: smooth ? 'smooth' : 'auto'
        })
      }
      const isNearBottom = () => {
        return messagesContainer.scrollHeight - messagesContainer.scrollTop - messagesContainer.clientHeight < 100
      }
      let currentRoomId = null
      let pendingScrollEventId = null
      const executePendingScroll = () => {
        if (!pendingScrollEventId) {
          return
        }

        const msgElement = document.getElementById(`messageData-${pendingScrollEventId}`)
        if (msgElement) {
          msgElement.scrollIntoView({
            behavior: 'smooth',
            block: 'center'
          })

          const bubble = msgElement.querySelector('atoll-message-bubble')
          if (bubble) {
            bubble.setAttribute('chat-timeline-ref', messagesContainer.getAttribute('ref'))
            bubble.style.transition = 'background-color 0.5s'
            const originalBg = bubble.style.backgroundColor
            bubble.style.backgroundColor = 'rgba(13, 110, 253, 0.2)'
            setTimeout(() => {
              bubble.style.backgroundColor = originalBg
            }, 2000)
          }
          pendingScrollEventId = null
        }
      }

      const createInnerContent = (message, isCurrentUser) => {
        const time = new Date(message.date).toLocaleTimeString([], {
          hour: '2-digit',
          minute: '2-digit'
        })

        const timelineRef = messagesContainer.getAttribute('ref')
        if (message.msgtype === 'm.invite') {
          const bubble = document.createElement('atoll-system-message')
          bubble.appendChild(document.createTextNode(message.body))
          return bubble
        } else if (message.decryptedPayload && message.decryptedPayload.type === 'tombstone') {
          // Tombstone for Ghost Chat / Key Mismatch
          const bubble = document.createElement('atoll-message-bubble')
          bubble.setAttribute('time', time)
          bubble.setAttribute('current-user', isCurrentUser)
          bubble.setAttribute('tombstone', 'true')

          if (timelineRef) {
            bubble.setAttribute('chat-timeline-ref', timelineRef)
          }

          const tombstoneDiv = document.createElement('div')
          tombstoneDiv.className = 'text-muted fst-italic'
          tombstoneDiv.innerHTML = '<i class="bi bi-shield-lock me-1"></i> Message encrypted with an older key'
          bubble.appendChild(tombstoneDiv)

          return bubble
        } else if (message.isEncrypted && !message.body && (!message.decryptedPayload || message.decryptedPayload.payload === undefined)) {
          const bubble = document.createElement('atoll-message-bubble')
          bubble.setAttribute('time', time)
          bubble.setAttribute('current-user', isCurrentUser)

          if (timelineRef) {
            bubble.setAttribute('chat-timeline-ref', timelineRef)
          }

          bubble.appendChild(document.createTextNode('*Encrypted message*'))
          return bubble
        } else if (message.msgtype === 'webtorrent' && message.decryptedPayload && message.decryptedPayload.payload) {
          let info = {}
          try {
            info = JSON.parse(message.decryptedPayload.payload)
          } catch (error){
          }
          const torrentBubble = document.createElement('atoll-torrent-bubble')
          // Flatten info object into individual attributes
          if (info.filename) {
            torrentBubble.setAttribute('info-filename', info.filename)
          }
          if (info.size) {
            torrentBubble.setAttribute('info-size', info.size)
          }
          if (info.mimeType) {
            torrentBubble.setAttribute('info-mime-type', info.mimeType)
          }
          if (info.magnetURI) {
            torrentBubble.setAttribute('info-magnet-uri', info.magnetURI)
          }
          if (info.key) {
            torrentBubble.setAttribute('info-key', JSON.stringify(info.key))
          }
          if (info.iv) {
            torrentBubble.setAttribute('info-iv', info.iv)
          }

          torrentBubble.setAttribute('event-id', message.id)
          torrentBubble.setAttribute('sender-id', message.sender_id)
          torrentBubble.setAttribute('room-id', currentRoomId)

          const bubble = document.createElement('atoll-message-bubble')
          bubble.setAttribute('time', time)
          bubble.setAttribute('current-user', isCurrentUser)
          bubble.setAttribute('event-id', message.id)
          bubble.setAttribute('room-id', currentRoomId)

          if (timelineRef) {
            bubble.setAttribute('chat-timeline-ref', timelineRef)
          }

          bubble.appendChild(torrentBubble)

          return bubble
        } else {
          const bubble = document.createElement('atoll-message-bubble')
          bubble.setAttribute('time', time)
          bubble.setAttribute('current-user', isCurrentUser)
          bubble.setAttribute('event-id', message.id)
          bubble.setAttribute('room-id', currentRoomId)

          if (timelineRef) {
            bubble.setAttribute('chat-timeline-ref', timelineRef)
          }

          const decryptedBody = message.decryptedPayload ? message.decryptedPayload.payload : message.body
          if (decryptedBody) {
            bubble.appendChild(document.createTextNode(decryptedBody))
          }

          const reactionsContainer2 = document.createElement('atoll-message-reactions')
          reactionsContainer2.setAttribute('slot', 'reactions')
          reactionsContainer2.setAttribute('event-id', message.id)
          reactionsContainer2.setAttribute('room-id', currentRoomId)

          if (message.reactions) {
            Object.entries(message.reactions).forEach(([emoji, data]) => {
              const reactionElement = document.createElement('atoll-message-reaction')
              reactionElement.setAttribute('emoji', emoji)
              reactionElement.setAttribute('count', data.count)
              reactionElement.setAttribute('has-reacted', data.hasReacted)
              reactionElement.setAttribute('event-id', message.id)
              reactionElement.setAttribute('room-id', currentRoomId)
              reactionsContainer2.appendChild(reactionElement)
            })
          }
          bubble.appendChild(reactionsContainer2)

          return bubble
        }
      }
      const renderMessage = (message, isCurrentUser) => {
        const content = createInnerContent(message, isCurrentUser)
        // Add ID for scrolling
        content.id = `messageData-${message.txnId || message.id}`

        return content
      }
      subscribe('activeRoomReady', async (payload) => {
        if (!payload) {
          return
        }
        const { roomId } = payload
        if (currentCleanup) {
          currentCleanup()
        }
        currentRoomId = roomId
        messagesContainer.replaceChildren()
        const currentUserId = await getCurrentUserId()

        const handleIncomingMessage = (messageData, isCurrentUser) => {
          // If the message ID is already in the DOM, skip it.
          if (document.getElementById(`messageData-${messageData.id}`)) {
            return
          }

          const nearBottom = isNearBottom()
          const msgEl = renderMessage(messageData, isCurrentUser)
          messagesContainer.appendChild(msgEl)

          if (nearBottom || isCurrentUser) {
            setTimeout(() => scrollToBottom(true), 0)
          }
        }

        // Catch any incoming syncs immediately
        currentCleanup = await onRoomMessage(roomId, newMsg => {
          const isCurrentUser = newMsg.sender_id === currentUserId
          handleIncomingMessage(newMsg, isCurrentUser)
        })

        // Backfill whatever was already in memory
        const history = await getRoomMessages(roomId)
        history.forEach(message => {
          const isCurrentUser = message.sender_id === currentUserId
          handleIncomingMessage(message, isCurrentUser)
        })

        if (pendingScrollEventId) {
          setTimeout(executePendingScroll, 50)
        } else {
          setTimeout(() => scrollToBottom(false), 0)
        }
      }, { signal })

      // Listen for requests to scroll to a specific message
      subscribe('targetScrollEventId', (payload) => {
        if (!payload) {
          return
        }
        pendingScrollEventId = payload.eventId
        executePendingScroll()
      }, { signal })

      return () => {
        if (currentCleanup) {
          currentCleanup()
        }
      }
    }
  }
})
</script>
