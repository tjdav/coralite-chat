<template id="atoll-chat-timeline">
  <div class="d-flex flex-column p-4 overflow-auto h-100" ref="messagesContainer">
    <!-- Messages rendered here -->
  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'
export default defineComponent({
  client: {
    components: ['atoll-message-bubble', 'atoll-torrent-bubble'],
    script: ({
      helpers
    }) => {
      const {
        refs: references,
        subscribe,
        getCurrentUserId,
        getRoomMessages,
        onRoomMessage
      } = helpers
      const messagesContainer = references('messagesContainer')
      let currentCleanup = null
      const scrollToBottom = (smooth = true) => {
        messagesContainer.scrollTo({
          top: messagesContainer.scrollHeight,
          behavior: smooth ? 'smooth' : 'auto'
        })
      }
      const isNearBottom = () => {
        return messagesContainer.scrollHeight - messagesContainer.scrollTop - messagesContainer.clientHeight < 100
      }
      let currentRoomId = null
      let pendingScrollEventId = null
      let messageObserver = null
      const messageDataMap = new WeakMap()
      const handleIntersection = entries => {
        entries.forEach(entry => {
          const div = entry.target
          if (entry.isIntersecting) {
            if (div.children.length === 0) {
              const data = messageDataMap.get(div)
              if (data) {
                const content = createInnerContent(data.message, data.isCurrentUser)
                div.appendChild(content)
                div.style.removeProperty('height')
                div.style.removeProperty('min-height')
              }
            }
          } else {
            if (div.children.length > 0) {
              const height = div.getBoundingClientRect().height
              if (height > 0) {
                div.style.height = `${height}px`
                div.style.minHeight = `${height}px`
                div.replaceChildren()
              }
            }
          }
        })
      }
      const executePendingScroll = () => {
        if (!pendingScrollEventId) {
          return
        }
        const msgElement = document.getElementById(`msg-${pendingScrollEventId}`)
        if (msgElement) {
          msgElement.scrollIntoView({
            behavior: 'smooth',
            block: 'center'
          })
          const bubble = msgElement.querySelector('atoll-message-bubble')
          if (bubble) {
            bubble.style.transition = 'background-color 0.5s'
            const originalBg = bubble.style.backgroundColor
            bubble.style.backgroundColor = 'rgba(13, 110, 253, 0.2)'
            setTimeout(() => {
              bubble.style.backgroundColor = originalBg
            }, 2000)
          }
          pendingScrollEventId = null
        }
      }
      const createInnerContent = (message, isCurrentUser) => {
        const time = new Date(message.date).toLocaleTimeString([], {
          hour: '2-digit',
          minute: '2-digit'
        })
        if (message.isEncrypted && !message.body) {
          const bubble = document.createElement('atoll-message-bubble')
          bubble.setAttribute('time', time)
          bubble.setAttribute('current-user', isCurrentUser)
          bubble.appendChild(document.createTextNode('*Encrypted message*'))
          return bubble
        } else if (message.msgtype === 'm.atoll.webtorrent' && message.info) {
          const torrentBubble = document.createElement('atoll-torrent-bubble')
          // Flatten info object into individual attributes
          if (message.info.filename) {
            torrentBubble.setAttribute('info-filename', message.info.filename)
          }
          if (message.info.size) {
            torrentBubble.setAttribute('info-size', message.info.size)
          }
          if (message.info.mimeType) {
            torrentBubble.setAttribute('info-mime-type', message.info.mimeType)
          }
          if (message.info.magnetURI) {
            torrentBubble.setAttribute('info-magnet-uri', message.info.magnetURI)
          }
          if (message.info.key) {
            torrentBubble.setAttribute('info-key', JSON.stringify(message.info.key))
          }
          if (message.info.iv) {
            torrentBubble.setAttribute('info-iv', message.info.iv)
          }

          torrentBubble.setAttribute('event-id', message.id)
          torrentBubble.setAttribute('sender-id', message.sender)
          torrentBubble.setAttribute('room-id', currentRoomId)

          const bubble = document.createElement('atoll-message-bubble')
          bubble.setAttribute('time', time)
          bubble.setAttribute('current-user', isCurrentUser)
          bubble.setAttribute('event-id', message.id)
          bubble.setAttribute('room-id', currentRoomId)
          if (message.reactions) {
            bubble.setAttribute('reactions', JSON.stringify(message.reactions))
          }
          bubble.appendChild(torrentBubble)
          return bubble
        } else {
          const bubble = document.createElement('atoll-message-bubble')
          bubble.setAttribute('time', time)
          bubble.setAttribute('current-user', isCurrentUser)
          bubble.setAttribute('event-id', message.id)
          bubble.setAttribute('room-id', currentRoomId)
          if (message.body) {
            bubble.appendChild(document.createTextNode(message.body))
          }
          if (message.reactions) {
            bubble.setAttribute('reactions', JSON.stringify(message.reactions))
          }
          return bubble
        }
      }
      const renderMessage = (message, isCurrentUser) => {
        const div = document.createElement('div')
        // Add ID for scrolling
        div.id = `msg-${message.id}`
        messageDataMap.set(div, {
          message,
          isCurrentUser
        })
        const content = createInnerContent(message, isCurrentUser)
        div.appendChild(content)
        if (messageObserver) {
          messageObserver.observe(div)
        }
        return div
      }
      subscribe('activeRoomReady', async (payload) => {
        if (!payload) {
          return
        }
        const { roomId } = payload
        if (currentCleanup) {
          currentCleanup()
        }
        if (messageObserver) {
          messageObserver.disconnect()
        }
        messageObserver = new IntersectionObserver(handleIntersection, {
          root: messagesContainer,
          rootMargin: '500px 0px'
        })
        currentRoomId = roomId
        messagesContainer.replaceChildren()
        const currentUserId = await getCurrentUserId()

        const handleIncomingMessage = (msg, isCurrentUser) => {
          // If the message ID is already in the DOM, skip it.
          if (document.getElementById(`msg-${msg.id}`)) {
            return
          }

          const nearBottom = isNearBottom()
          const msgEl = renderMessage(msg, isCurrentUser)
          messagesContainer.appendChild(msgEl)

          if (nearBottom || isCurrentUser) {
            setTimeout(() => scrollToBottom(true), 0)
          }
        }

        // Catch any incoming syncs immediately
        currentCleanup = await onRoomMessage(roomId, newMsg => {
          const isCurrentUser = newMsg.sender === currentUserId
          handleIncomingMessage(newMsg, isCurrentUser)
        })

        // Backfill whatever was already in memory
        const history = await getRoomMessages(roomId)
        history.forEach(message => {
          const isCurrentUser = message.sender === currentUserId
          handleIncomingMessage(message, isCurrentUser)
        })

        if (pendingScrollEventId) {
          setTimeout(executePendingScroll, 50)
        } else {
          setTimeout(() => scrollToBottom(false), 0)
        }
      })

      // Listen for requests to scroll to a specific message
      subscribe('targetScrollEventId', (payload) => {
        if (!payload) {
          return
        }
        pendingScrollEventId = payload.eventId
        executePendingScroll()
      })
      return () => {
        if (currentCleanup) {
          currentCleanup()
        }
        if (messageObserver) {
          messageObserver.disconnect()
        }
      }
    }
  }
})
</script>
