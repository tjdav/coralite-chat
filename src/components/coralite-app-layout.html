<template id="coralite-app-layout">
  <div class="d-flex vh-100 overflow-hidden" ref="layoutContainer">
    <!-- Left Sidebar Column (Always Visible) -->
    <div class="w-250px bg-dark text-white d-flex flex-column border-end border-secondary">
      <coralite-sidebar></coralite-sidebar>
    </div>
    
    <!-- Middle Column: Chat List (Hidden when not on 'chats' tab) -->
    <div class="max-width-600 border-end border-secondary d-flex flex-column h-100" ref="chatListContainer">
      <coralite-chat-list></coralite-chat-list>
    </div>
    
    <!-- Right Column: Chat Window (Hidden when not on 'chats' tab) -->
    <div class="flex-grow-1 d-flex flex-column h-100 bg-body" ref="chatWindowContainer">
      <coralite-chat-window></coralite-chat-window>
    </div>
    
    <!-- Media View Column (Hidden when on 'chats' tab) -->
    <div class="flex-grow-1 d-none flex-column h-100 bg-body overflow-hidden" ref="mediaViewContainer">
      <coralite-media-view></coralite-media-view>
    </div>
  </div>
</template>

<script type="module" client>
  import { defineComponent } from 'coralite'

  export default defineComponent({
    client: {
      script: ({ helpers }) => {
        const { refs, on, emit, events } = helpers
        
        const chatListContainer = refs('chatListContainer')
        const chatWindowContainer = refs('chatWindowContainer')
        const mediaViewContainer = refs('mediaViewContainer')

        // Listen for navigation changes from the sidebar
        on(events('nav:changed'), ({ tab }) => {
          if (tab === 'chats') {
            // Show chat columns, hide media view
            chatListContainer.classList.remove('d-none')
            chatWindowContainer.classList.remove('d-none')
            mediaViewContainer.classList.add('d-none')
            mediaViewContainer.classList.remove('d-flex')
          } else {
            // Hide chat columns, show media view
            chatListContainer.classList.add('d-none')
            chatWindowContainer.classList.add('d-none')
            mediaViewContainer.classList.remove('d-none')
            mediaViewContainer.classList.add('d-flex')
          }
        })

        // Listen for "Go to Message" requests from the media view
        on(events('nav:jump-to-message'), ({ roomId, eventId }) => {
          // 1. Switch tab back to 'chats'
          emit(events('nav:changed'), { tab: 'chats' })
          
          // 2. Open the specific room
          emit(events('chat:room-selected'), { roomId })
          
          // 3. Tell the timeline to scroll to the specific message. 
          // We wait a tiny bit to let the room load asynchronously. Ideally, the timeline component
          // would cache this request, but sending it slightly delayed or setting a global pending scroll works too.
          // For a robust fix, we will just emit the scroll event which the timeline will now handle intelligently.
          emit(events('chat:scroll-to-message'), { eventId })
        })
      }
    }
  })
</script>
