<template id="atoll-chat-window">
  <div class="d-flex flex-column h-100 bg-body">
    <!-- Header Placeholder -->
    <div class="p-3 border-bottom border-secondary d-flex justify-content-between align-items-center bg-body-tertiary" ref="chatHeader" style="display: none !important;">
      <div class="d-flex align-items-center">
        <div ref="roomAvatar" class="me-3"></div>
        <h5 class="m-0 fw-bold" ref="roomName">Select a chat</h5>
      </div>
      <div>
        <button class="btn btn-sm btn-outline-secondary rounded-circle me-2" ref="startVoiceCallBtn"><i class="bi bi-telephone"></i></button>
        <button class="btn btn-sm btn-outline-secondary rounded-circle me-2" ref="startVideoCallBtn"><i class="bi bi-camera-video"></i></button>
        <button class="btn btn-sm btn-outline-secondary rounded-circle me-2" ref="openInviteModalBtn" aria-label="Invite"><i class="bi bi-person-plus"></i></button>
        <button class="d-none" ref="openInviteModalHiddenBtn">Invite</button>
        <button class="btn btn-sm btn-outline-secondary rounded-circle"><i class="bi bi-three-dots"></i></button>
      </div>
    </div>

    <!-- Empty State -->
    <div class="flex-grow-1 d-flex justify-content-center align-items-center flex-column text-muted" ref="emptyState">
      <i class="bi bi-chat-left-dots" style="font-size: 4rem;"></i>
      <h4 class="mt-3">Your Messages</h4>
      <p>Select a chat or start a new conversation.</p>
    </div>

    <!-- Invite State -->
    <div class="flex-grow-1 d-flex justify-content-center align-items-center flex-column text-muted d-transition-none" ref="inviteState">
      <i class="bi bi-envelope-open" style="font-size: 4rem;"></i>
      <h4 class="mt-3">Room Invitation</h4>
      <p>You have been invited to this room.</p>
      <button class="btn btn-primary mt-3" ref="joinRoomBtn">Join</button>
    </div>

    <!-- Timeline (Hidden Initially) -->
    <div class="flex-grow-1 overflow-auto d-transition-none" ref="timeline">
      <atoll-chat-timeline></atoll-chat-timeline>
    </div>

    <!-- Input (Hidden Initially) -->
    <div class="p-3 border-top border-secondary bg-body-tertiary d-transition-none" ref="inputContainer">
      <atoll-chat-input></atoll-chat-input>
    </div>

    <!-- Invite Modal -->
    <div class="modal fade" tabindex="-1" aria-labelledby="{{ ref_inviteModalLabel }}" aria-hidden="true" ref="inviteModal">
      <div class="modal-dialog">
        <div class="modal-content text-bg-dark">
          <div class="modal-header border-secondary">
            <h1 class="modal-title fs-5" id="{{ ref_inviteModalLabel }}" ref="inviteModalLabel">Invite to Room</h1>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label for="{{ ref_inviteUserIdInput }}" class="form-label">User ID</label>
              <input type="text" class="form-control bg-dark text-white border-secondary" id="{{ ref_inviteUserIdInput }}" ref="inviteUserIdInput">
            </div>
          </div>
          <div class="modal-footer border-secondary">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" ref="sendInviteBtn">Send Invite</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'
export default defineComponent({
  client: {
    imports: [{
      specifier: 'bootstrap',
      namespaceExport: 'bootstrap'
    }],
    script: ({
      helpers,
      imports
    }) => {
      const {
        refs: references,
        on,
        emit,
        events,
        getRoom,
        sendMessage,
        seed,
        sendTorrentMessage,
        inviteUser,
        joinRoom,
        sendReaction,
        removeReaction
      } = helpers
      const chatHeader = references('chatHeader')
      const roomAvatar = references('roomAvatar')
      const roomName = references('roomName')
      const emptyState = references('emptyState')
      const inviteState = references('inviteState')
      const timeline = references('timeline')
      const inputContainer = references('inputContainer')
      const startVoiceCallBtn = references('startVoiceCallBtn')
      const startVideoCallBtn = references('startVideoCallBtn')
      const inviteModal = references('inviteModal')
      const inviteUserIdInput = references('inviteUserIdInput')
      const sendInviteBtn = references('sendInviteBtn')
      const joinRoomBtn = references('joinRoomBtn')
      let activeRoomId = null
      startVoiceCallBtn.addEventListener('click', () => {
        if (activeRoomId) {
          emit(events('call:start'), {
            roomId: activeRoomId,
            type: 'voice'
          })
        }
      })
      startVideoCallBtn.addEventListener('click', () => {
        if (activeRoomId) {
          emit(events('call:start'), {
            roomId: activeRoomId,
            type: 'video'
          })
        }
      })
      const createAvatarHTML = (name, url) => {
        if (url) {
          return '<img src="' + url + '" alt="' + name + '" class="rounded-circle object-fit-cover" style="width: 30px; height: 30px;">'
        }
        const initials = name ? name.substring(0, 2).toUpperCase() : '?'
        return '<div class="rounded-circle bg-secondary text-white d-flex align-items-center justify-content-center fw-bold fs-6" style="width: 30px; height: 30px;">' + initials + '</div>'
      }
      on(events('chat:room-selected'), async ({
        roomId
      }) => {
        activeRoomId = roomId
        const roomDetails = await getRoom(roomId)
        if (roomDetails) {
          roomName.textContent = roomDetails.name
          roomAvatar.innerHTML = createAvatarHTML(roomDetails.name, roomDetails.avatarUrl)

          // Show header, hide empty state
          chatHeader.style.display = 'flex'
          emptyState.classList.remove('d-transition-show')
          emptyState.classList.add('d-transition-none')
          if (roomDetails.membership === 'invite') {
            inviteState.classList.remove('d-transition-none')
            inviteState.classList.add('d-transition-show')
            timeline.classList.remove('d-transition-show')
            timeline.classList.add('d-transition-none')
            inputContainer.classList.remove('d-transition-show')
            inputContainer.classList.add('d-transition-none')
          } else {
            inviteState.classList.remove('d-transition-show')
            inviteState.classList.add('d-transition-none')
            timeline.classList.remove('d-transition-none')
            timeline.classList.add('d-transition-show')
            inputContainer.classList.remove('d-transition-none')
            inputContainer.classList.add('d-transition-show')
            // Notify timeline to load messages
            emit(events('chat:room-ready'), {
              roomId
            })
          }
        }
      })
      helpers.refs('openInviteModalBtn').addEventListener('click', () => {
        const modal = imports.bootstrap.Modal.getOrCreateInstance(helpers.refs('inviteModal'))
        modal.show()
      })
      helpers.refs('openInviteModalHiddenBtn').addEventListener('click', () => {
        const modal = imports.bootstrap.Modal.getOrCreateInstance(helpers.refs('inviteModal'))
        modal.show()
      })
      sendInviteBtn.addEventListener('click', async () => {
        if (!activeRoomId) {
          return
        }
        const userId = inviteUserIdInput.value.trim()
        if (!userId) {
          return
        }
        try {
          await inviteUser(activeRoomId, userId)
          inviteUserIdInput.value = ''
          const modalElement = inviteModal
          const bootstrapModal = imports.bootstrap.Modal.getInstance(modalElement)
          if (bootstrapModal) {
            bootstrapModal.hide()
          }
        } catch (error) {
          console.error('Failed to send invite:', error)
        }
      })
      joinRoomBtn.addEventListener('click', async () => {
        if (!activeRoomId) {
          return
        }
        try {
          await joinRoom(activeRoomId)
          inviteState.classList.remove('d-transition-show')
          inviteState.classList.add('d-transition-none')
          timeline.classList.remove('d-transition-none')
          timeline.classList.add('d-transition-show')
          inputContainer.classList.remove('d-transition-none')
          inputContainer.classList.add('d-transition-show')
          emit(events('chat:room-ready'), {
            roomId: activeRoomId
          })

          // Optionally, emit an event so chat-list can re-render if needed
          emit(events('chat:rooms-updated'))
        } catch (error) {
          console.error('Failed to join room:', error)
        }
      })
      on(events('chat:message-submitted'), async ({
        text
      }) => {
        if (!activeRoomId) {
          return
        }
        try {
          await sendMessage(activeRoomId, text)
          emit(events('chat:message-sent'))
        } catch (error) {
          console.error('Failed to send message:', error)
        }
      })
      on(events('chat:send-reaction'), async ({
        roomId,
        eventId,
        reaction
      }) => {
        if (!roomId || !eventId || !reaction) {
          return
        }
        try {
          await sendReaction(roomId, eventId, reaction)
        } catch (error) {
          console.error('Failed to send reaction:', error)
        }
      })
      on(events('chat:remove-reaction'), async ({
        roomId,
        eventId,
        reaction
      }) => {
        if (!roomId || !eventId || !reaction) {
          return
        }
        try {
          await removeReaction(roomId, eventId, reaction)
        } catch (error) {
          console.error('Failed to remove reaction:', error)
        }
      })
      on(events('chat:file-selected'), async ({
        file
      }) => {
        if (!activeRoomId) {
          return
        }
        try {
          // Generate AES-GCM key
          const key = await crypto.subtle.generateKey({
            name: 'AES-GCM',
            length: 256
          }, true, ['encrypt', 'decrypt'])

          // Generate IV
          const iv = crypto.getRandomValues(new Uint8Array(12))

          // Encrypt file
          const fileBuffer = await file.arrayBuffer()
          const encryptedBuffer = await crypto.subtle.encrypt({
            name: 'AES-GCM',
            iv: iv
          }, key, fileBuffer)
          const encryptedBlob = new Blob([encryptedBuffer])

          // Start Seeding
          const magnetURI = await seed(encryptedBlob)

          // Export Key to JWK and IV to Base64
          const jwk = await crypto.subtle.exportKey('jwk', key)
          const base64Iv = btoa(Array.from(iv, byte => String.fromCodePoint(byte)).join(''))

          // Send Matrix Signal
          const torrentPayload = {
            magnetURI,
            key: jwk,
            iv: base64Iv,
            filename: file.name,
            size: file.size,
            mimeType: file.type || 'application/octet-stream'
          }
          await sendTorrentMessage(activeRoomId, torrentPayload)
        } catch (error) {
          console.error('Failed to process and send file:', error)
        } finally {
          // Re-enable UI
          emit(events('chat:file-processing-done'))
        }
      })
    }
  }
})
</script>
