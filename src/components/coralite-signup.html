<template id="coralite-signup">
  <div class="d-flex align-items-center justify-content-center vh-100">
    <div class="card p-4" style="width: 400px; max-width: 100%;">
      <h2 class="text-center mb-4">Sign Up to Matrix</h2>
      <form ref="form">
        <div class="form-floating mb-3">
          <input type="url" class="form-control" ref="homeserver" placeholder="Homeserver URL" required>
          <label for="{{ ref_homeserver }}">Homeserver URL</label>
        </div>
        <div class="form-floating mb-3">
          <input type="text" class="form-control" ref="username" placeholder="Username" required>
          <label for="{{ ref_username }}">Username</label>
        </div>
        <div class="form-floating mb-3">
          <input type="password" class="form-control" ref="password" placeholder="Password" required>
          <label for="{{ ref_password }}">Password</label>
        </div>
        <div class="form-floating mb-3">
          <input type="password" class="form-control" ref="confirmPassword" placeholder="Confirm Password" required>
          <label for="{{ ref_confirmPassword }}">Confirm Password</label>
        </div>
        <button type="submit" class="btn btn-primary w-100" ref="submitButton">Sign Up</button>
      </form>
      <div class="alert alert-danger mt-3 d-none" role="alert" ref="errorAlert"></div>
      
      <div class="text-center mt-3">
        <a href="#" class="text-muted text-decoration-none" ref="loginLink">Already have an account? Log in.</a>
      </div>
    </div>
  </div>
</template>

<script type="module" client>
  import { defineComponent } from 'coralite'

  export default defineComponent({
    client: {
      script: ({ helpers, context }) => {
        const { refs, registerUser, sync, emit, events } = helpers
        const form = refs('form')
        const homeserverInput = refs('homeserver')
        const usernameInput = refs('username')
        const passwordInput = refs('password')
        const confirmPasswordInput = refs('confirmPassword')
        const errorAlert = refs('errorAlert')
        const submitButton = refs('submitButton')
        const loginLink = refs('loginLink')
        homeserverInput.value = (helpers.getDefaultHomeserverUrl && helpers.getDefaultHomeserverUrl()) || 'https://matrix.org'

        loginLink.addEventListener('click', (e) => {
          e.preventDefault()
          emit(events('auth:show-login'))
        })

        form.addEventListener('submit', async (e) => {
          e.preventDefault()

          const baseUrl = homeserverInput.value
          const username = usernameInput.value
          const password = passwordInput.value
          const confirmPassword = confirmPasswordInput.value

          errorAlert.classList.add('d-none')
          
          if (password !== confirmPassword) {
            errorAlert.textContent = 'Passwords do not match.'
            errorAlert.classList.remove('d-none')
            return
          }

          submitButton.disabled = true
          submitButton.textContent = 'Signing up...'

          try {
            await registerUser({
              baseUrl,
              username,
              password
            })

            submitButton.textContent = 'Syncing...'
            await sync()

            emit(events('app:logged-in'))
          } catch (error) {
            console.error('Sign up error', error)
            errorAlert.textContent = 'Registration failed. Please try again. ' + (error.message || '')
            errorAlert.classList.remove('d-none')
            submitButton.disabled = false
            submitButton.textContent = 'Sign Up'
          }
        })
      }
    }
  })
</script>
