<template id="list-pane">
  <div class="list-pane d-flex flex-column h-100">
    <header class="p-3 border-bottom bg-body d-flex justify-content-between align-items-center">
      <h5 class="mb-0 text-capitalize" ref="paneTitle">Chats</h5>
      <button class="btn btn-sm btn-primary rounded-circle" ref="btnCreateRoom" title="Create Room" style="display: none;">
        <i class="bi bi-plus-lg"></i>
      </button>
    </header>
    <div class="flex-grow-1 overflow-hidden" ref="listContainer">
      <!-- Specialized list components will be mounted here -->
    </div>
    <!-- Pre-register components for the bundler -->
    <div style="display: none;">
      <chat-list></chat-list>
      <picture-list></picture-list>
      <video-list></video-list>
      <music-list></music-list>
    </div>
  </div>
</template>

<style>
  .list-pane {
    background-color: var(--bs-tertiary-bg);
  }
</style>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    script: ({ refs, state, $state, $bus }) => {
      state.currentAppView = $state.currentAppView || 'chats'

      const updateView = () => {
        const view = state.currentAppView
        const container = refs('listContainer')
        const titleRef = refs('paneTitle')
        const btnCreateRoom = refs('btnCreateRoom')

        if (!container) return

        // Update Title
        if (titleRef) {
          titleRef.textContent = view.charAt(0).toUpperCase() + view.slice(1)
        }

        // Update Create Room Button visibility
        if (btnCreateRoom) {
          btnCreateRoom.style.display = (view === 'chats') ? 'block' : 'none'
        }

        // Clear container
        container.innerHTML = ''

        // Mount specialized component
        let componentName = ''
        if (view === 'chats') {
          componentName = 'chat-list'
        } else if (view === 'pictures') {
          componentName = 'picture-list'
        } else if (view === 'videos') {
          componentName = 'video-list'
        } else if (view === 'music') {
          componentName = 'music-list'
        } else if (view === 'settings') {
          const settingsMsg = document.createElement('div')
          settingsMsg.className = 'p-4 text-center text-muted'
          settingsMsg.textContent = 'Settings configuration coming soon.'
          container.appendChild(settingsMsg)
          return
        }

        if (componentName) {
          const el = document.createElement(componentName)
          container.appendChild(el)
        }
      }

      // Initial render
      updateView()

      // Handle Create Room button click
      const btnCreateRoom = refs('btnCreateRoom')
      if (btnCreateRoom) {
        btnCreateRoom.addEventListener('click', () => {
          $bus.emit('open-create-room')
        })
      }

      // Reactivity to global state
      if (typeof $state.subscribe === 'function') {
        $state.subscribe('currentAppView', (val) => {
          state.currentAppView = val
          updateView()
        })
      }
    }
  })
</script>
