<template id="atoll-audio-volume">
  <!-- Right: Volume & Extra -->
  <div class="d-flex align-items-center justify-content-end gap-2" style="width: 250px;">
    <button class="btn btn-link text-white p-1" ref="queueBtn" title="Queue">
      <i class="bi bi-music-note-list"></i>
    </button>
    <button class="btn btn-link text-white p-1" ref="volumeBtn" title="Mute/Unmute">
      <i class="bi bi-volume-up" ref="volumeIcon"></i>
    </button>
    <input type="range" class="form-range" ref="volumeSlider" value="100" min="0" max="100" style="width: 100px; height: 4px;">
  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'
export default defineComponent({
  client: {
    script: ({
      helpers
    }) => {
      const {
        refs: references,
        on,
        emit,
        events
      } = helpers
      const queueButton = references('queueBtn')
      const volumeButton = references('volumeBtn')
      const volumeIcon = references('volumeIcon')
      const volumeSlider = references('volumeSlider')

      // Parent informs us of volume change
      on(events('player:volume-update'), ({
        volume,
        isMuted
      }) => {
        if (!isMuted) {
          volumeSlider.value = volume * 100
        } else {
          volumeSlider.value = 0
        }
        volumeIcon.classList.remove('bi-volume-up', 'bi-volume-down', 'bi-volume-mute', 'bi-volume-off')
        if (volume === 0 || isMuted) {
          volumeIcon.classList.add('bi-volume-mute')
        } else if (volume < 0.5) {
          volumeIcon.classList.add('bi-volume-down')
        } else {
          volumeIcon.classList.add('bi-volume-up')
        }
      })
      queueButton.addEventListener('click', () => {
        emit(events('player:toggle-queue'))
      })
      volumeButton.addEventListener('click', () => {
        emit(events('player:toggle-mute'))
      })
      volumeSlider.addEventListener('input', () => {
        emit(events('player:set-volume'), {
          volume: volumeSlider.value / 100
        })
      })
    }
  }
})
</script>
