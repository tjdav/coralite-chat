<template id="app-layout">
  <div class="app-layout d-flex vh-100 vw-100 overflow-hidden bg-body">
    <!-- Column 1: Navigation Sidebar (Fixed 80px) -->
    <nav-sidebar></nav-sidebar>

    <!-- Column 2: Contextual List (Fixed 350px) -->
    <div ref="columnTwo" class="contextual-list border-end bg-body-tertiary d-flex flex-column" style="width: 350px; min-width: 350px;">
      <list-pane></list-pane>
    </div>

    <!-- Column 3: Main Detail View (Fluid) -->
    <div ref="columnThree" class="detail-view flex-grow-1 bg-body-secondary">
      <div class="h-100 d-flex align-items-center justify-content-center" style="display: {{ emptyStateDisplay }};">
        <div class="text-center">
          <i class="bi bi-chat-dots fs-1 text-secondary mb-3 d-block"></i>
          <p class="text-muted mb-0">Select a conversation or media item</p>
        </div>
      </div>
      <div class="h-100" style="display: {{ chatViewDisplay }};">
        <chat-view></chat-view>
      </div>
      <div class="h-100" style="display: {{ imageViewerDisplay }};">
        <image-viewer></image-viewer>
      </div>
      <div class="h-100" style="display: {{ videoPlayerDisplay }};">
        <video-player-view></video-player-view>
      </div>
    </div>
  </div>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    data: () => ({
      activeSelectionId: null,
      activeSelectionType: null,
      currentAppView: 'chats'
    }),
    getters: {
      currentViewTitle: (state) => state.currentAppView || 'Chats',
      emptyStateDisplay: (state) => ((!state.activeSelectionId || (state.activeSelectionType !== 'chats' && state.activeSelectionType !== 'pictures' && state.activeSelectionType !== 'videos')) ? 'flex' : 'none'),
      chatViewDisplay: (state) => ((state.activeSelectionId && state.activeSelectionType === 'chats') ? 'block' : 'none'),
      imageViewerDisplay: (state) => ((state.activeSelectionId && state.activeSelectionType === 'pictures') ? 'block' : 'none'),
      videoPlayerDisplay: (state) => ((state.activeSelectionId && state.activeSelectionType === 'videos') ? 'block' : 'none')
    },
    script: ({ state, $state }) => {
      state.currentAppView = $state.currentAppView
      state.activeSelectionId = $state.activeSelectionId
      state.activeSelectionType = $state.activeSelectionType

      // Subscribe to global state changes to keep component state in sync
      if (typeof $state.subscribe === 'function') {
        $state.subscribe('currentAppView', (value) => {
          state.currentAppView = value
        })
        $state.subscribe('activeSelectionId', (value) => {
          state.activeSelectionId = value
        })
        $state.subscribe('activeSelectionType', (value) => {
          state.activeSelectionType = value
        })
      }
    }
  })
</script>
