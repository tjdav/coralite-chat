<template id="atoll-audio-timeline">
  <!-- Center: Timeline -->
  <div class="d-flex align-items-center w-100 gap-2">
    <span class="text-muted" style="font-size: 0.75rem; min-width: 35px; text-align: right;" ref="currentTimeDisplay">0:00</span>
    <input type="range" class="form-range flex-grow-1" ref="seekSlider" value="0" min="0" max="100" step="0.1" style="height: 4px;">
    <span class="text-muted" style="font-size: 0.75rem; min-width: 35px;" ref="durationDisplay">0:00</span>
  </div>
</template>

<script type="module" client>
import { defineComponent } from 'coralite'
export default defineComponent({
  client: {
    script: ({
      helpers
    }) => {
      const {
        refs: references,
        on,
        emit,
        events
      } = helpers
      const currentTimeDisplay = references('currentTimeDisplay')
      const seekSlider = references('seekSlider')
      const durationDisplay = references('durationDisplay')
      let isSeeking = false
      const formatTime = seconds => {
        if (isNaN(seconds) || seconds < 0) {
          return '0:00'
        }
        const m = Math.floor(seconds / 60)
        const s = Math.floor(seconds % 60)
        return `${m}:${s.toString().padStart(2, '0')}`
      }

      // Listen for time updates from the parent audio player
      on(events('player:time-update'), ({
        currentTime
      }) => {
        if (!isSeeking) {
          seekSlider.value = currentTime
          currentTimeDisplay.textContent = formatTime(currentTime)
        }
      })
      on(events('player:duration-change'), ({
        duration
      }) => {
        seekSlider.max = duration
        durationDisplay.textContent = formatTime(duration)
      })

      // Handle seeking
      seekSlider.addEventListener('mousedown', () => {
        isSeeking = true
      })
      seekSlider.addEventListener('touchstart', () => {
        isSeeking = true
      })
      seekSlider.addEventListener('input', () => {
        currentTimeDisplay.textContent = formatTime(seekSlider.value)
      })
      const finishSeek = () => {
        isSeeking = false
        emit(events('player:seek'), {
          time: parseFloat(seekSlider.value)
        })
      }
      seekSlider.addEventListener('mouseup', finishSeek)
      seekSlider.addEventListener('touchend', finishSeek)
    }
  }
})
</script>
