<template id="atoll-audio-timeline">
  <!-- Center: Timeline -->
  <div class="d-flex align-items-center w-100 gap-2">
    <span class="text-muted" style="font-size: 0.75rem; min-width: 35px; text-align: right;" ref="currentTimeDisplay" id="{{ ref_currentTimeDisplay }}">0:00</span>
    <input type="range" class="form-range flex-grow-1" ref="seekSlider" id="{{ ref_seekSlider }}" value="0" min="0" max="100" step="0.1" style="height: 4px;">
    <span class="text-muted" style="font-size: 0.75rem; min-width: 35px;" ref="durationDisplay" id="{{ ref_durationDisplay }}">0:00</span>
  </div>
</template>

<script type="module" client>
  import { defineComponent } from 'coralite'

  export default defineComponent({
    client: {
      script: ({ helpers }) => {
        const { refs, on, emit } = helpers
        
        const currentTimeDisplay = refs('currentTimeDisplay')
        const seekSlider = refs('seekSlider')
        const durationDisplay = refs('durationDisplay')

        let isSeeking = false

        const formatTime = (seconds) => {
          if (isNaN(seconds) || seconds < 0) return '0:00'
          const m = Math.floor(seconds / 60)
          const s = Math.floor(seconds % 60)
          return `${m}:${s.toString().padStart(2, '0')}`
        }

        // Listen for time updates from the parent audio player
        on('player:time-update', ({ currentTime }) => {
          if (!isSeeking) {
            seekSlider.value = currentTime
            currentTimeDisplay.textContent = formatTime(currentTime)
          }
        })

        on('player:duration-change', ({ duration }) => {
          seekSlider.max = duration
          durationDisplay.textContent = formatTime(duration)
        })

        // Handle seeking
        seekSlider.addEventListener('mousedown', () => {
          isSeeking = true
        })

        seekSlider.addEventListener('touchstart', () => {
          isSeeking = true
        })

        seekSlider.addEventListener('input', () => {
          currentTimeDisplay.textContent = formatTime(seekSlider.value)
        })

        const finishSeek = () => {
          isSeeking = false
          emit('player:seek', { time: parseFloat(seekSlider.value) })
        }

        seekSlider.addEventListener('mouseup', finishSeek)
        seekSlider.addEventListener('touchend', finishSeek)
      }
    }
  })
</script>
